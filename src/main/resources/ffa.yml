# Configuration section for Settings.
SETTINGS:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  # The numerical value for Return Delay Seconds. Available options: Any valid integer
  RETURN_DELAY_SECONDS: 3
# Configuration section for Rollback.
ROLLBACK:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  # The numerical value for Padding Horizontal. Available options: Any valid integer
  PADDING_HORIZONTAL: 48
  # The numerical value for Padding Vertical. Available options: Any valid integer
  PADDING_VERTICAL: 20
  # The numerical value for Timeout Seconds. Available options: Any valid integer
  TIMEOUT_SECONDS: 10
  # Determines whether Cleanup Projectiles is enabled or disabled. Available options: true, false
  CLEANUP_PROJECTILES: true
  # Determines whether Cleanup Drops is enabled or disabled. Available options: true, false
  CLEANUP_DROPS: true
  # Determines whether Cleanup Fire And Fluids is enabled or disabled. Available options: true, false
  CLEANUP_FIRE_AND_FLUIDS: true
# Configuration section for Player State.
PLAYER_STATE:
  # Determines whether Restore Inventory is enabled or disabled. Available options: true, false
  RESTORE_INVENTORY: true
  # Determines whether Restore Health is enabled or disabled. Available options: true, false
  RESTORE_HEALTH: true
  # Determines whether Restore Effects is enabled or disabled. Available options: true, false
  RESTORE_EFFECTS: true
# Configuration section for Rules.
RULES:
  # Determines whether Block Commands is enabled or disabled. Available options: true, false
  BLOCK_COMMANDS: true
  # Determines whether Count Toward Global Stats is enabled or disabled. Available options: true, false
  COUNT_TOWARD_GLOBAL_STATS: false
  # Determines whether Give Survival Rewards is enabled or disabled. Available options: true, false
  GIVE_SURVIVAL_REWARDS: false
# The text or value for Arena Settings. Available options: Any valid string text
ARENA_SETTINGS: {}
