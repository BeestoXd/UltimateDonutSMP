# UDS setup: FFA arena rules, rollback behavior, player state handling, and arena defaults.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Enables or disables settings.
  RETURN_DELAY_SECONDS: 3 # Sets the time value in seconds.

# UDS setup: World or arena reset behavior after a match ends.
ROLLBACK:
  ENABLED: true # Enables or disables rollback.
  PADDING_HORIZONTAL: 48 # Configures the padding horizontal option.
  PADDING_VERTICAL: 20 # Configures the padding vertical option.
  TIMEOUT_SECONDS: 10 # Sets the time value in seconds.
  CLEANUP_PROJECTILES: true # Configures the cleanup projectiles option.
  CLEANUP_DROPS: true # Configures the cleanup drops option.
  CLEANUP_FIRE_AND_FLUIDS: true # Configures the cleanup fire and fluids option.

# UDS setup: Inventory, health, effects, and state handling for arena entry/exit.
PLAYER_STATE:
  RESTORE_INVENTORY: true # Configures the restore inventory option.
  RESTORE_HEALTH: true # Configures the restore health option.
  RESTORE_EFFECTS: true # Configures the restore effects option.

# UDS setup: Rule toggles that control what players can do in this mode.
RULES:
  BLOCK_COMMANDS: true # Configures the block commands option.
  COUNT_TOWARD_GLOBAL_STATS: false # Configures the count toward global stats option.
  GIVE_SURVIVAL_REWARDS: false # Configures the give survival rewards option.

# UDS setup: Arena world, spawn, rollback, and match environment defaults.
ARENA_SETTINGS: {} # Configures the arena settings option.
