# UDS setup: FFA arena rules, rollback behavior, player state handling, and arena defaults.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Options: true or false
  RETURN_DELAY_SECONDS: 3 # Sets the time value in seconds.

# UDS setup: World or arena reset behavior after a match ends.
ROLLBACK:
  ENABLED: true # Options: true or false
  PADDING_HORIZONTAL: 48 # Padding Horizontal setting.
  PADDING_VERTICAL: 20 # Padding Vertical setting.
  TIMEOUT_SECONDS: 10 # Sets the time value in seconds.
  CLEANUP_PROJECTILES: true # Cleanup Projectiles setting.
  CLEANUP_DROPS: true # Cleanup Drops setting.
  CLEANUP_FIRE_AND_FLUIDS: true # Cleanup Fire And Fluids setting.

# UDS setup: Inventory, health, effects, and state handling for arena entry/exit.
PLAYER_STATE:
  RESTORE_INVENTORY: true # Restore Inventory setting.
  RESTORE_HEALTH: true # Restore Health setting.
  RESTORE_EFFECTS: true # Restore Effects setting.

# UDS setup: Rule toggles that control what players can do in this mode.
RULES:
  BLOCK_COMMANDS: true # Block Commands setting.
  COUNT_TOWARD_GLOBAL_STATS: false # Count Toward Global Stats setting.
  GIVE_SURVIVAL_REWARDS: false # Give Survival Rewards setting.

# UDS setup: Arena world, spawn, rollback, and match environment defaults.
ARENA_SETTINGS: {} # Arena Settings setting.
