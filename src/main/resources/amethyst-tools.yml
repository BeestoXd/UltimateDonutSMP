# UDS setup: Amethyst tool abilities, upgrade behavior, GUI text, and related messages.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# ═══════════════════════════════════════════════════════
#   Amethyst Tools Configuration - UltimateDonutSmp
# ═══════════════════════════════════════════════════════

# UDS setup: Amethyst tool ability settings, cooldowns, costs, and upgrades.
AMETHYST-TOOLS:

  # Worlds where amethyst tools are completely disabled
  EXCLUDED-WORLDS:
    - duels

  # ── Particles ─────────────────────────────────────────
  PARTICLES:
    ENABLED: true # Options: true or false
    TYPE: BLOCK # Type setting.
    BLOCK-MATERIAL: PURPLE_CONCRETE_POWDER # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    COUNT: 12 # Count setting.
    SPREAD: 0.4 # Spread setting.

  # ── Sounds ────────────────────────────────────────────
  SOUNDS:
    USE:     "minecraft:block.amethyst_block.hit|1.0|1.2" # Use setting.
    EXPIRE:  "minecraft:entity.lightning_bolt.impact|0.5|2.0" # Expire setting.
    BREAK:   "minecraft:block.amethyst_block.break|1.0|0.8" # Break setting.
    ACTIVATE: "minecraft:block.amethyst_block.resonate|1.0|1.0" # Activate setting.

  SECURITY:
    REQUIRE-ITEM-ID: true # Sets the identifier used to link this configuration.
    BIND-TO-OWNER: false # Bind To Owner setting.
    CLICK-COOLDOWN-MS: 250 # Sets the cooldown before this action can run again.
    BLOCK-HOPPER-PICKUP: true # Block Hopper Pickup setting.

  # ── Amethyst Drill ────────────────────────────────────
  DRILL:
    MATERIAL: NETHERITE_PICKAXE # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lamethyst drill" # Sets the name text used here.
    LORE:
      - "&#BDC3C7breaks &d9 blocks &7per strike"
      - "&#BDC3C7powered by amethyst energy"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    ENCHANTMENTS:
      - "efficiency:5"
      - "unbreaking:3"
      - "fortune:3"
    RADIUS: 1 # Numeric value for distance or time
    DISABLED-BLOCKS:
      - DIRT
      - GRASS_BLOCK
      - COARSE_DIRT
      - ROOTED_DIRT
      - PODZOL
      - SAND
      - RED_SAND
      - GRAVEL
      - SPAWNER
      - BEDROCK
      - OBSIDIAN
      - CRYING_OBSIDIAN
      - END_PORTAL_FRAME
      - FARMLAND
      - SOUL_SAND
      - SOUL_SOIL
    DURATION: 86400 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 0
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

  # ── Amethyst Tree Chopper ─────────────────────────────
  CHOPPER:
    MATERIAL: NETHERITE_AXE # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lamethyst tree chopper" # Sets the name text used here.
    LORE:
      - "&#BDC3C7chops entire trees &dinstantly"
      - "&#BDC3C7vein-style breaking"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    ENCHANTMENTS:
      - "efficiency:10"
      - "unbreaking:3"
    MAX-LOGS: 128 # Numeric value (integer)
    LOG-BLOCKS:
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - JUNGLE_LOG
      - ACACIA_LOG
      - DARK_OAK_LOG
      - CHERRY_LOG
      - MANGROVE_LOG
      - CRIMSON_STEM
      - WARPED_STEM
      - STRIPPED_OAK_LOG
      - STRIPPED_SPRUCE_LOG
      - STRIPPED_BIRCH_LOG
      - STRIPPED_JUNGLE_LOG
      - STRIPPED_ACACIA_LOG
      - STRIPPED_DARK_OAK_LOG
      - STRIPPED_CHERRY_LOG
      - STRIPPED_MANGROVE_LOG
      - STRIPPED_CRIMSON_STEM
      - STRIPPED_WARPED_STEM
    DURATION: 86400 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 1
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

  # ── Amethyst Sell Axe ─────────────────────────────────
  SELL-AXE:
    MATERIAL: NETHERITE_AXE # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lamethyst sell axe" # Sets the name text used here.
    LORE:
      - "&#BDC3C7instantly sells all items in a chest"
      - "&#BDC3C7right-click a chest to sell"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    ENCHANTMENTS:
      - "efficiency:5"
      - "unbreaking:3"
    DURATION: 86400 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 2
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

  # ── Amethyst Shovel ───────────────────────────────────
  SHOVEL:
    MATERIAL: NETHERITE_SHOVEL # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lamethyst shovel" # Sets the name text used here.
    LORE:
      - "&#BDC3C7breaks &d9 blocks &7per strike"
      - "&#BDC3C7only for soft terrain blocks"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    ENCHANTMENTS:
      - "efficiency:5"
      - "unbreaking:3"
      - "fortune:3"
    RADIUS: 1 # Numeric value for distance or time
    ALLOWED-BLOCKS:
      - DIRT
      - GRASS_BLOCK
      - COARSE_DIRT
      - PODZOL
      - ROOTED_DIRT
      - GRAVEL
      - SAND
      - RED_SAND
      - CLAY
      - SOUL_SAND
      - SOUL_SOIL
      - FARMLAND
      - DIRT_PATH
      - SNOW
      - SNOW_BLOCK
      - POWDER_SNOW
      - MUD
    DURATION: 86400 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 3
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

  # ── Amethyst Bucket ───────────────────────────────────
  BUCKET:
    MATERIAL: BUCKET # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lamethyst bucket" # Sets the name text used here.
    LORE:
      - "&#BDC3C7drains &d27 water blocks &7at once"
      - "&#BDC3C7right-click water to drain"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    DRAIN-RADIUS: 1 # Numeric value for distance or time
    MAX-DRAIN: 27 # Numeric value (integer)
    DURATION: 86400 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 4
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

  # ── Shard Booster ─────────────────────────────────────
  SHARD-BOOSTER:
    MATERIAL: POTION # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&#9B59B6&lshard booster" # Sets the name text used here.
    LORE:
      - "&#BDC3C7&d4x &7shard multiplier"
      - "&#BDC3C7duration: &d60 minutes"
      - ""
      - "&#BDC3C7drink to &dactivate"
      - ""
      - "&#9B59B6✦ self destruct"
      - "&#BDC3C7{time}"
    BOOSTER-DURATION: 3600 # Sets how long this behavior lasts.
    DURATION: 3600 # Sets how long this behavior lasts.
    SHARD-SHOP:
      ENABLED: false # Enable to add this tool to /shardshop.
      SLOT: 5
      PRICE-PER-UNIT: 0 # Set the shard price before enabling.
      # DURATION: 3600 # Optional; defaults to the tool's DURATION above.
      MIN-QUANTITY: 1
      MAX-QUANTITY: 1
      DEFAULT-QUANTITY: 1
      HIDE-QUANTITY-BUTTONS: true

# ── Messages ──────────────────────────────────────────────────────────────────
# UDS setup: Messages sent by the amethyst tools system.
AMETHYST-MESSAGES:
  PREFIX: "&#9B59B6[ᴀᴍᴇᴛʜʏѕᴛ] &r" # Sets the text format used by this option.
  EXPIRED:           "{prefix}&# Expired setting.
  EXCLUDED-WORLD:    "{prefix}&#BDC3C7ᴀᴍᴇᴛʜʏѕᴛ ᴛᴏᴏʟѕ ᴄᴀɴɴᴏᴛ ʙᴇ ᴜѕᴇᴅ ɪɴ ᴛʜɪѕ ᴡᴏʀʟᴅ." # Sets the world name used by this option.
  DRILL-BREAK:       "{prefix}&# Drill Break setting.
  CHOP-BREAK:        "{prefix}&# Chop Break setting.
  SELL-SUCCESS:      "{prefix}&# Sell Success setting.
  SELL-EMPTY:        "{prefix}&# Sell Empty setting.
  SELL-FAILED:       "{prefix}&# Sell Failed setting.
  SELL-NO-CHEST:     "{prefix}&# Sell No Chest setting.
  BUCKET-DRAIN:      "{prefix}&# Bucket Drain setting.
  BUCKET-NO-WATER:   "{prefix}&# Bucket No Water setting.
  BOOSTER-ACTIVATED: "{prefix}&# Booster Activated setting.
  BOOSTER-ALREADY:   "{prefix}&# Booster Already setting.
  NO-PERMISSION:     "{prefix}&# Permission node (e.g., ultimatedonutsmp.admin)
  WRONG-OWNER:       "{prefix}&# Wrong Owner setting.
  GIVE-SUCCESS:      "{prefix}&# Give Success setting.
  GIVE-USAGE:        "{prefix}&# Give Usage setting.
  GIVE-INVALID-TYPE: "{prefix}&# Give Invalid Type setting.
  RELOAD-SUCCESS:    "{prefix}&# Reload Success setting.
