      HIDE-QUANTITY-BUTTONS: true
  # Configuration section for Bucket.
  BUCKET:
    MATERIAL: BUCKET
    NAME: '&#9B59B6&lAmethyst Bucket'
    LORE:
    - '&#BDC3C7Drains &d27 water blocks &7at once'
