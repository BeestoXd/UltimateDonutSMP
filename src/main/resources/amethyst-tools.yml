    # Configuration section for Shard Shop.
    SHARD-SHOP:
      # Determines whether Enabled is enabled or disabled. Available options: true, false
      ENABLED: false
      SLOT: 15
      # The numerical value for Min Quantity. Available options: Any valid integer
      MIN-QUANTITY: 1
      # The numerical value for Max Quantity. Available options: Any valid integer
      MAX-QUANTITY: 1
      # The numerical value for Default Quantity. Available options: Any valid integer
      DEFAULT-QUANTITY: 1
      # Determines whether Hide Quantity Buttons is enabled or disabled. Available options: true, false
      HIDE-QUANTITY-BUTTONS: true
  # Configuration section for Shard Booster.
  SHARD-BOOSTER:
    MATERIAL: POTION
    NAME: '&#9B59B6&lShard Booster'
    LORE:
    - '&#BDC3C7&d4X &7Shard Multiplier'
    - '&#BDC3C7Duration: &d60 minutes'
    - ''
    - '&#BDC3C7Drink to &dactivate'
    - ''
    - '&#9B59B6✦ Self Destruct'
    - '&#BDC3C7{time}'
    # The numerical value for Booster Duration. Available options: Any valid integer
    BOOSTER-DURATION: 3600
