# UDS setup: Billford rotation, access, shop GUI, and feedback configuration.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# ============================================================
# Billford Trade
# Rotating trade system inspired by DonutSMP.
# ============================================================

# Default active trade on a fresh install.
# Runtime state is stored in billford-data.yml after the first boot.
# UDS setup: Current selected value used by this rotating system.
CURRENT: 1 # Current setting.

# Rotation mode:
# SEQUENTIAL -> 1 -> 2 -> 3 -> 1
# RANDOM     -> random trade, never repeats the same trade twice in a row
# UDS setup: Controls how the feature rotates between configured entries.
ROTATION_MODE: SEQUENTIAL # Rotation Mode setting.

# UDS setup: Countdown timings and messages before the next action.
COUNTDOWN:
  ENABLED: true # Options: true or false
  # SYSTEM uses the machine timezone running the server.
  # You can set a real zone like "Asia/Makassar" or "UTC" if needed.
  TIME_ZONE: SYSTEM # Time Zone setting.
  START_DATE: "2026-01-31 00:00:00" # Start Date setting.
  # Days and hours are combined, so 3 days + 12 hours is valid.
  INTERVAL_DAYS: 3 # Sets how often this task or update runs.
  INTERVAL_HOURS: 0 # Sets how often this task or update runs.

# UDS setup: Toggles announcements when the rotation changes.
ANNOUNCE_ON_ROTATE: true # Announce On Rotate setting.
# UDS setup: Announcement text used when rotation changes are broadcast.
ANNOUNCE_MESSAGE: "&6&l[billford] &etrade has rotated! &7new trade is live. &bnext change in &f{countdown}&b." # Announce Message setting.

# UDS setup: Permission and access rules for opening or using this feature.
ACCESS:
  # Leave blank to allow everyone.
  PERMISSION: "" # Permission node (e.g., ultimatedonutsmp.admin)
  COMMAND: "/billford" # Sets the command executed or suggested here.
  NPC:
    ENABLED: false # Options: true or false
    DISPLAY_NAME: "&abillford" # Text string (supports & color codes)
    INTERACT_COMMAND: "/billford" # Sets the command executed or suggested here.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  CLICK_COOLDOWN_MS: 1000 # Sets the cooldown before this action can run again.
  CLOSE_MENU_ON_SUCCESS: true # Close Menu On Success setting.
  REOPEN_ON_TRADE_CHANGE: true # Reopen On Trade Change setting.
  ALLOWED_CLICK_TYPES:
    - LEFT
    - RIGHT

# UDS setup: Menu title, rows, slots, buttons, and item layout for this feature.
GUI:
  TITLE: "&8&lʙɪʟʟꜰᴏʀᴅ &7ᴛʀᴀᴅᴇ" # Text string (supports & color codes)
  SIZE: 54 # Inventory size in slots (multiple of 9, max 54)
  FILLER_MATERIAL: GRAY_STAINED_GLASS_PANE # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
  REWARD_SLOT: 25 # Sets the inventory slot used by this item.
  COUNTDOWN_SLOT: 31 # Sets the inventory slot used by this item.
  INFO_SLOT: 49 # Sets the inventory slot used by this item.
  CONFIRM_SLOT: 22 # Sets the inventory slot used by this item.
  INFO_MATERIAL: BOOK # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)

  INPUT_NAME: "&f{item}" # Sets the name text used here.
  INPUT_LORE:
    - "&7ᴄᴏѕᴛ: &f{amount}x &e{item}"
    - ""
    - "&8ᴍᴜѕᴛ ᴀʟʀᴇᴀᴅʏ ʙᴇ ɪɴ ʏᴏᴜʀ ɪɴᴠᴇɴᴛᴏʀʏ."

  REWARD_NAME: "&aʀᴇᴡᴀʀᴅ" # Sets the name text used here.
  REWARD_LORE:
    - "&7ʀᴇᴡᴀʀᴅ: &a{amount}x &f{item}"
    - "{money_line}"
    - "{shard_line}"
    - ""
    - "&8ɢʀᴀɴᴛᴇᴅ ᴡʜᴇɴ ᴛʜᴇ ᴛʀᴀᴅᴇ ѕᴜᴄᴄᴇᴇᴅѕ."

  COUNTDOWN_NAME: "&e{trade_name}" # Sets the name text used here.
  COUNTDOWN_LORE:
    - "&7ɴᴇxᴛ ʀᴏᴛᴀᴛɪᴏɴ: &b{countdown}"
    - ""
    - "&8ᴛʀᴀᴅᴇ &f{trade_id} &8ᴏꜰ &f{trade_count}"

  INFO_NAME: "&6ᴛʀᴀᴅᴇ ɪɴꜰᴏ" # Sets the name text used here.
  INFO_LIMITED_LORE:
    - "&7ᴛʀᴀᴅᴇѕ: &f{used} &7/ &f{limit}"
    - "{status_line}"
  INFO_UNLIMITED_LORE:
    - "&7ᴛʀᴀᴅᴇѕ ᴅᴏɴᴇ: &f{used}"
    - "&aᴜɴʟɪᴍɪᴛᴇᴅ ᴛʀᴀᴅᴇѕ ᴛʜɪѕ ʀᴏᴛᴀᴛɪᴏɴ."

  CONFIRM_BUTTON:
    MATERIAL: EMERALD # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&a&lᴄᴏɴꜰɪʀᴍ ᴛʀᴀᴅᴇ" # Sets the name text used here.
    LORE:
      - "&7ʙʀɪɴɢ ᴛʜᴇ ʀᴇǫᴜɪʀᴇᴅ ɪᴛᴇᴍѕ,"
      - "&7ᴛʜᴇɴ ᴄʟɪᴄᴋ ᴛᴏ ᴇxᴄʜᴀɴɢᴇ ᴛʜᴇᴍ."
      - ""
      - "&a&lᴄʟɪᴄᴋ ᴛᴏ ᴄᴏɴꜰɪʀᴍ"

  LIMIT_BUTTON:
    MATERIAL: BARRIER # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
    NAME: "&c&lʟɪᴍɪᴛ ʀᴇᴀᴄʜᴇᴅ" # Sets the name text used here.
    LORE:
      - "&cʏᴏᴜ ᴀʟʀᴇᴀᴅʏ ᴜѕᴇᴅ ᴛʜɪѕ ᴅᴇᴀʟ ᴇɴᴏᴜɢʜ"
      - "&cꜰᴏʀ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ʀᴏᴛᴀᴛɪᴏɴ."
      - "&7ᴄᴏᴍᴇ ʙᴀᴄᴋ ᴀꜰᴛᴇʀ ᴛʜᴇ ɴᴇxᴛ ʀᴇꜰʀᴇѕʜ."

# UDS setup: Action result messages and feedback text for this feature.
FEEDBACK:
  SUCCESS_PARTICLE:
    ENABLED: true # Options: true or false
    TYPE: TOTEM_OF_UNDYING # Type setting.
    COUNT: 24 # Count setting.

# ============================================================
# Trade definitions
# INPUTS supports 1-9 items.
# SLOT is 1-based and supports the full GUI size.
# LIMIT: 0 = unlimited per rotation
# REWARD can also grant optional SHARD_BONUS or MONEY_BONUS
# ============================================================

# UDS setup: Billford shop entries, prices, stock, and rotation content.
BILLFORD:
  1:
    DISPLAY_NAME: "the gem exchange" # Text string (supports & color codes)
    LIMIT: 3 # Limit setting.
    INPUTS:
