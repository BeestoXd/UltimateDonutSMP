# UDS setup: SpawnStash bait structure definitions and staff alert behavior.
# UDS setup: Add new entries under TYPES to create more /spawnstash types without code changes.
# UDS setup: Use SPAWNER_TYPE with a key from spawners.yml TYPES. Optional: SPAWNER_STACK and SPAWNER_ACCESS.
# UDS setup: Containers can use CONTAINER_ITEMS, CHEST_ITEMS, or ITEMS with SLOT, MATERIAL, AMOUNT, DISPLAY_NAME, LORE.
# UDS setup: CLAIM_SPAWNERS_ON_BREAK gives the managed spawner item to the player who breaks a SpawnStash spawner.

SETTINGS:
  ENABLED: true # Enables or disables settings.
  DEFAULT_TTL_SECONDS: 900 # Sets how long this behavior lasts.
  DEFAULT_ALERT_RADIUS: 8.0 # Sets the radius used for this check or effect.
  ALERT_COOLDOWN_SECONDS: 30 # Sets the cooldown before this action can run again.
  CHECK_INTERVAL_TICKS: 20 # Sets how often this task or update runs.
  OVERWRITE_BLOCKS: true # Configures the overwrite blocks option.
  PROTECT_BLOCKS: false # Configures the protect blocks option.
  CLAIM_SPAWNERS_ON_BREAK: false # Configures the claim spawners on break option.
  ROLLBACK_ON_RELOAD: true # Configures the rollback on reload option.
  LOG_TO_CONSOLE: true # Configures the log to console option.
  MAX_BLOCKS_PER_STASH: 256 # Sets the allowed limit for this option.

MESSAGES:
  USAGE:
    - "&8&m----------- &dѕᴘᴀᴡɴѕᴛᴀѕʜ &8&m-----------"
    - "&f/{label} &7- ѕᴘᴀᴡɴ ʀᴀɴᴅᴏᴍ ʙᴀɪᴛ ѕᴛᴀѕʜ"
    - "&f/{label} <type> &7- ѕᴘᴀᴡɴ ᴀ ʙᴀɪᴛ ѕᴛᴀѕʜ"
    - "&f/{label} ѕᴘᴀᴡɴ <type> &7- ѕᴘᴀᴡɴ ᴀ ʙᴀɪᴛ ѕᴛᴀѕʜ"
    - "&f/{label} ʟɪѕᴛ &7- ʟɪѕᴛ ᴀᴄᴛɪᴠᴇ/configured ѕᴛᴀѕʜᴇѕ"
    - "&f/{label} ʀᴇᴍᴏᴠᴇ <id|nearest|all> &7- ʀᴏʟʟʙᴀᴄᴋ ѕᴛᴀѕʜᴇѕ"
    - "&f/{label} ʀᴇʟᴏᴀᴅ &7- ʀᴇʟᴏᴀᴅ ѕᴘᴀᴡɴ-ѕᴛᴀѕʜ.ʏᴍʟ"
  SPAWNED: "&aѕᴘᴀᴡɴᴇᴅ ѕᴛᴀѕʜ #{type} ѕᴜᴄᴄᴇѕѕꜰᴜʟʟʏ. &7(ɪᴅ: {id})" # Sets the message text for this response.
  REMOVED: "&aʀᴇᴍᴏᴠᴇᴅ ѕᴛᴀѕʜ &f#{id}&a." # Sets the message text for this response.
  REMOVED-ALL: "&aʀᴇᴍᴏᴠᴇᴅ &f{count}&a ᴀᴄᴛɪᴠᴇ ѕᴛᴀѕʜ(ᴇѕ)." # Sets the message text for this response.
  EXPIRED: "&7ѕᴘᴀᴡɴѕᴛᴀѕʜ #{id} ᴇxᴘɪʀᴇᴅ ᴀɴᴅ ᴡᴀѕ ʀᴏʟʟᴇᴅ ʙᴀᴄᴋ." # Sets the message text for this response.
  RELOADED: "&aѕᴘᴀᴡɴѕᴛᴀѕʜ ѕᴇᴛᴛɪɴɢѕ ʀᴇʟᴏᴀᴅᴇᴅ." # Sets the message text for this response.
  DISABLED: "&cѕᴘᴀᴡɴѕᴛᴀѕʜ ɪѕ ᴄᴜʀʀᴇɴᴛʟʏ ᴅɪѕᴀʙʟᴇᴅ." # Sets the message text for this response.
  PLAYER-ONLY: "&cᴏɴʟʏ ᴘʟᴀʏᴇʀѕ ᴄᴀɴ ᴜѕᴇ ᴛʜɪѕ ᴄᴏᴍᴍᴀɴᴅ." # Sets the message text for this response.
  NO-PERMISSION: "&cyou do not have permission." # Sets the message text for this response.
  NO-ACTIVE: "&cɴᴏ ᴀᴄᴛɪᴠᴇ ѕᴛᴀѕʜ ꜰᴏᴜɴᴅ." # Sets the message text for this response.
  BLOCKED-BREAK: "&cᴛʜɪѕ ѕᴛᴀѕʜ ɪѕ ᴘʀᴏᴛᴇᴄᴛᴇᴅ. ᴜѕᴇ &f/spawnstash ʀᴇᴍᴏᴠᴇ ɴᴇᴀʀᴇѕᴛ &cᴛᴏ ʀᴏʟʟʙᴀᴄᴋ ɪᴛ." # Sets the message text for this response.
  SPAWNER-CLAIMED: "&aᴄʟᴀɪᴍᴇᴅ &f{amount}x {spawner}&a ꜰʀᴏᴍ ѕᴘᴀᴡɴѕᴛᴀѕʜ." # Sets the message text for this response.
  SPAWNER-CLAIMED-DROPPED: "&aᴄʟᴀɪᴍᴇᴅ &f{amount}x {spawner}&a. &7ɪɴᴠᴇɴᴛᴏʀʏ ꜰᴜʟʟ, ɪᴛᴇᴍ ᴅʀᴏᴘᴘᴇᴅ." # Sets the message text for this response.
  INVALID-TYPE: "&cᴜɴᴋɴᴏᴡɴ ѕᴛᴀѕʜ ᴛʏᴘᴇ '&f{type}&c'. ᴜѕᴇ &f/spawnstash ʟɪѕᴛ&c." # Sets the message text for this response.
  INVALID-CONFIG: "&cѕᴘᴀᴡɴѕᴛᴀѕʜ ᴄᴏɴꜰɪɢ ɪѕ ɪɴᴠᴀʟɪᴅ: &f{reason}&c." # Sets the message text for this response.
  ALERT:
    - "&8[&dѕᴘᴀᴡɴѕᴛᴀѕʜ&8] &f{player} &7ᴛʀɪɢɢᴇʀᴇᴅ &d{reason}&7 ᴏɴ ѕᴛᴀѕʜ &f#{id}&7 (&f{type}&7)"
    - "&7ʟᴏᴄᴀᴛɪᴏɴ: &f{world} {x}, {y}, {z} &8| &7ᴄʀᴇᴀᴛᴇᴅ ʙʏ: &f{creator}"
  ALERT-HOVER: "&eᴄʟɪᴄᴋ ᴛᴏ ᴛᴇʟᴇᴘᴏʀᴛ ᴛᴏ &f{player}" # Sets the message text for this response.

TYPES:
  "1":
    ENABLED: true # Enables or disables "1".
    DISPLAY_NAME: "&dcompact amethyst stash" # Sets the display name shown to players.
    TTL_SECONDS: 900 # Sets the time value in seconds.
    ALERT_RADIUS: 8.0 # Sets the radius used for this check or effect.
    PASTE_OFFSET: [0, 0, 0] # Configures the paste offset option.
    BLOCKS:
      - {OFFSET: [-1, 0, 0], MATERIAL: DEEPSLATE}
      - {OFFSET: [0, 0, 0], MATERIAL: SPAWNER, SPAWNER_TYPE: SKELETON, SPAWNER_ACCESS: PUBLIC}
      - {OFFSET: [1, 0, 0], MATERIAL: DEEPSLATE}
      - {OFFSET: [-1, 0, 1], MATERIAL: COBBLED_DEEPSLATE}
