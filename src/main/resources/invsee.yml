# UDS setup: Staff inventory viewer permissions, layout, refresh behavior, and messages.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Inventory viewer permissions, edit rules, notifications, and logging.
INVSEE:
  ENABLED: true # Options: true or false
  TITLE: "&8inventory of {player}" # Text string (supports & color codes)
  REQUIRE-ONLINE: true # Require Online setting.
  ALLOW-EDIT: false # Allow Edit setting.
  ALLOW-SELF-VIEW: false # Allow Self View setting.
  NOTIFY-TARGET: false # Notify Target setting.
  LOG-USAGE: true # Log Usage setting.
  FREEZE-ON-LOGOUT: true # Freeze On Logout setting.
  AUTO-REFRESH-TICKS: 10 # Sets how often this task or update runs.
  VIEW-PERMISSION: "ultimatedonutsmp.staff.invsee" # Permission node (e.g., ultimatedonutsmp.admin)
  MODIFY-PERMISSION: "ultimatedonutsmp.staff.invsee.modify" # Permission node (e.g., ultimatedonutsmp.admin)
  ADMIN-PERMISSION: "ultimatedonutsmp.admin.invsee" # Numeric value (integer)

# UDS setup: Slot layout and fixed UI positions for this menu.
LAYOUT:
  SIZE: 54 # Inventory size in slots (multiple of 9, max 54)
  ARMOR-SLOTS: [0, 1, 2, 3] # Armor Slots setting.
  OFFHAND-SLOT: 4 # Sets the inventory slot used by this item.
  SUMMARY-SLOT: 6 # Sets the inventory slot used by this item.
  STATUS-SLOT: 8 # Sets the inventory slot used by this item.
  MAIN-INVENTORY-START: 18 # Main Inventory Start setting.
  HOTBAR-START: 45 # Hotbar Start setting.

# UDS setup: Configure MESSAGES options for this file.
MESSAGES:
  NO-PERMISSION: "&cyou do not have permission." # Sets the message text for this response.
  FEATURE-DISABLED: "&cᴛʜᴇ ɪɴᴠѕᴇᴇ ѕʏѕᴛᴇᴍ ɪѕ ᴅɪѕᴀʙʟᴇᴅ." # Sets the message text for this response.
  PLAYER-NOT-ONLINE: "&cᴛʜᴀᴛ ᴘʟᴀʏᴇʀ ᴍᴜѕᴛ ʙᴇ ᴏɴʟɪɴᴇ." # Sets the message text for this response.
  PLAYER-NOT-FOUND: "&cᴘʟᴀʏᴇʀ ɴᴏᴛ ꜰᴏᴜɴᴅ." # Sets the message text for this response.
  SELF-VIEW-DISABLED: "&cʏᴏᴜ ᴄᴀɴɴᴏᴛ ɪɴᴠѕᴇᴇ ʏᴏᴜʀѕᴇʟꜰ." # Sets the message text for this response.
  EDIT-CONFLICT: "&eᴀɴᴏᴛʜᴇʀ ѕᴛᴀꜰꜰ ᴍᴇᴍʙᴇʀ ɪѕ ᴀʟʀᴇᴀᴅʏ ᴇᴅɪᴛɪɴɢ &f{target}&e. ᴏᴘᴇɴᴇᴅ ɪɴ ʀᴇᴀᴅ-ᴏɴʟʏ ᴍᴏᴅᴇ." # Sets the message text for this response.
  TARGET-LOGGED-OUT: "&eᴛʜɪѕ ɪɴᴠᴇɴᴛᴏʀʏ ɪѕ ɴᴏᴡ ᴀ ꜰʀᴏᴢᴇɴ ѕɴᴀᴘѕʜᴏᴛ ʙᴇᴄᴀᴜѕᴇ &f{target}&e ʟᴏɢɢᴇᴅ ᴏᴜᴛ." # Sets the message text for this response.
  TARGET-NOTIFY: "&eʏᴏᴜʀ ɪɴᴠᴇɴᴛᴏʀʏ ɪѕ ʙᴇɪɴɢ ᴠɪᴇᴡᴇᴅ ʙʏ &f{viewer}&e ɪɴ &f{mode}&e ᴍᴏᴅᴇ." # Sets the message text for this response.
  RELOAD-SUCCESS: "&aɪɴᴠѕᴇᴇ ᴄᴏɴꜰɪɢ ʀᴇʟᴏᴀᴅᴇᴅ." # Sets the message text for this response.
