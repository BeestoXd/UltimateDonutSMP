# Configuration section for Invsee.
INVSEE:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  TITLE: '&8Inventory of {player}'
  # Determines whether Require Online is enabled or disabled. Available options: true, false
  REQUIRE-ONLINE: true
  # Determines whether Allow Edit is enabled or disabled. Available options: true, false
  ALLOW-EDIT: false
  # Determines whether Allow Self View is enabled or disabled. Available options: true, false
  ALLOW-SELF-VIEW: false
  # Determines whether Notify Target is enabled or disabled. Available options: true, false
  NOTIFY-TARGET: false
  # Determines whether Log Usage is enabled or disabled. Available options: true, false
  LOG-USAGE: true
  # Determines whether Freeze On Logout is enabled or disabled. Available options: true, false
  FREEZE-ON-LOGOUT: true
  # The numerical value for Auto Refresh Ticks. Available options: Any valid integer
  AUTO-REFRESH-TICKS: 10
  # The text or value for View Permission. Available options: Any valid string text
  VIEW-PERMISSION: ultimatedonutsmp.staff.invsee
  # The text or value for Modify Permission. Available options: Any valid string text
  MODIFY-PERMISSION: ultimatedonutsmp.staff.invsee.modify
  # The text or value for Admin Permission. Available options: Any valid string text
  ADMIN-PERMISSION: ultimatedonutsmp.admin.invsee
# Configuration section for Layout.
LAYOUT:
  SIZE: 54
  # Configuration section for Armor Slots.
  ARMOR-SLOTS:
  - 0
  - 1
  - 2
  - 3
  # The numerical value for Offhand Slot. Available options: Any valid integer
  OFFHAND-SLOT: 4
  # The numerical value for Summary Slot. Available options: Any valid integer
  SUMMARY-SLOT: 6
  # The numerical value for Status Slot. Available options: Any valid integer
  STATUS-SLOT: 8
  # The numerical value for Main Inventory Start. Available options: Any valid integer
  MAIN-INVENTORY-START: 18
  # The numerical value for Hotbar Start. Available options: Any valid integer
  HOTBAR-START: 45
MESSAGES:
  # The text or value for No Permission. Available options: Any valid string text
  NO-PERMISSION: '&cYou do not have permission.'
  # The text or value for Feature Disabled. Available options: Any valid string text
  FEATURE-DISABLED: '&cThe Invsee system is disabled.'
  # The text or value for Player Not Online. Available options: Any valid string text
  PLAYER-NOT-ONLINE: '&cThat player must be online.'
  # The text or value for Player Not Found. Available options: Any valid string text
  PLAYER-NOT-FOUND: '&cPlayer not found.'
  # The text or value for Self View Disabled. Available options: Any valid string text
  SELF-VIEW-DISABLED: '&cYou cannot invsee yourself.'
  # The text or value for Edit Conflict. Available options: Any valid string text
  EDIT-CONFLICT: '&eAnother staff member is already editing &f{target}&e. Opened in
    read-only mode.'
  # The text or value for Target Logged Out. Available options: Any valid string text
  TARGET-LOGGED-OUT: '&eThis inventory is now a frozen snapshot because &f{target}&e
    logged out.'
  # The text or value for Target Notify. Available options: Any valid string text
  TARGET-NOTIFY: '&eYour inventory is being viewed by &f{viewer}&e in &f{mode}&e mode.'
  # The text or value for Reload Success. Available options: Any valid string text
  RELOAD-SUCCESS: '&aInvsee config reloaded.'
