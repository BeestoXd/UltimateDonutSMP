# UDS setup: Purchase confirmation menu layout.
PURCHASE-SHOP-MENU:
  TITLE: "&8ᴄᴏɴꜰɪʀᴍᴀᴛɪᴏɴ ᴍᴇɴᴜ" # Sets the title text shown for this menu or prompt.
  SIZE: 27 # Sets the inventory size in slots.
  BUTTONS:
    MAIN:
      SLOT: 13 # Sets the inventory slot used by this item.
      LORE:
        MONEY: "&fʙᴜʏ ᴘʀɪᴄᴇ: &a${price}" # Configures the money option.
        SHARD: "&fʙᴜʏ ᴘʀɪᴄᴇ: &5${price}x &lѕʜᴀʀᴅѕ" # Configures the shard option.
        DEFAULT: "&fʙᴜʏ ᴘʀɪᴄᴇ: &a${price}" # Sets the default value used when none is selected.

    CANCEL:
      SLOT: 21 # Sets the inventory slot used by this item.
      MATERIAL: "RED_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
      NAME: "&cᴄᴀɴᴄᴇʟ" # Sets the name text used here.
      LORE: "&fᴄʟɪᴄᴋ ᴛᴏ ᴄᴀɴᴄᴇʟ" # Sets the lore text shown for this item.

    CONFIRM:
      SLOT: 23 # Sets the inventory slot used by this item.
      MATERIAL: "LIME_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
      NAME: "&aᴄᴏɴꜰɪʀᴍ" # Sets the name text used here.
      LORE: "&fᴄʟɪᴄᴋ ᴛᴏ ʙᴜʏ" # Sets the lore text shown for this item.

    QUANTITY_ADJUST:
      ADD:
        MATERIAL: "LIME_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
        ADD_1:
          SLOT: 15 # Sets the inventory slot used by this item.
          NAME: "&aᴀᴅᴅ 1" # Sets the name text used here.
          INCREMENT: 1 # Configures the increment option.
        ADD_10:
          SLOT: 16 # Sets the inventory slot used by this item.
          NAME: "&aᴀᴅᴅ 10" # Sets the name text used here.
          INCREMENT: 10 # Configures the increment option.
        SET_64:
          SLOT: 17 # Sets the inventory slot used by this item.
          NAME: "&aѕᴇᴛ ᴛᴏ 64" # Sets the name text used here.
          INCREMENT: 64 # Configures the increment option.

      REMOVE:
        MATERIAL: "RED_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
        REMOVE_1:
          SLOT: 11 # Sets the inventory slot used by this item.
          NAME: "&cʀᴇᴍᴏᴠᴇ 1" # Sets the name text used here.
          DECREMENT: 1 # Configures the decrement option.
        REMOVE_10:
          SLOT: 10 # Sets the inventory slot used by this item.
          NAME: "&cʀᴇᴍᴏᴠᴇ 10" # Sets the name text used here.
          DECREMENT: 10 # Configures the decrement option.
        REMOVE_64:
          SLOT: 9 # Sets the inventory slot used by this item.
          NAME: "&cʀᴇᴍᴏᴠᴇ 64" # Sets the name text used here.
          DECREMENT: 64 # Configures the decrement option.

  RESTRICTIONS:
    TOTEM_OF_UNDYING:
      MAX_QUANTITY: 1 # Sets the item amount used by this option.
      MIN_QUANTITY: 1 # Sets the item amount used by this option.
      HIDE_QUANTITY_BUTTONS: true # Configures the hide quantity buttons option.
    ENDER_PEARL:
      MAX_QUANTITY: 16 # Sets the item amount used by this option.
      MIN_QUANTITY: 1 # Sets the item amount used by this option.
    DEFAULT:
      MAX_QUANTITY: 64 # Sets the item amount used by this option.
      MIN_QUANTITY: 1 # Sets the item amount used by this option.

  MESSAGES:
    SUCCESS:
      MONEY: "&7ʏᴏᴜ ʙᴏᴜɢʜᴛ &e{quantity} {item-name}&7 ꜰᴏʀ &a${amount}" # Sets the message text for this response.
      SHARDS: "&7ʏᴏᴜ ʙᴏᴜɢʜᴛ {item-name}&7 ꜰᴏʀ &5{amount} ѕʜᴀʀᴅѕ" # Sets the message text for this response.
    ERROR:
      NO_MONEY: "&cʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ᴍᴏɴᴇʏ." # Sets the message text for this response.
      NO_SHARDS: "&cʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ѕʜᴀʀᴅѕ." # Sets the message text for this response.
      FULL_INVENTORY: "&cʏᴏᴜʀ ɪɴᴠᴇɴᴛᴏʀʏ ɪѕ ꜰᴜʟʟ." # Sets the message text for this response.

  SOUNDS:
    SUCCESS: "entity_experience_orb_pickup" # Configures the success option.
    ERROR: "entity_villager_no" # Configures the error option.

