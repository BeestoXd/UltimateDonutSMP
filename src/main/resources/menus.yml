# UDS setup: Shared menu layouts and item templates used by player-facing GUIs.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Shared menu items, filler settings, and reusable GUI defaults.
GLOBAL:
  PAGE-MENU:
    MATERIAL: "ARROW" # Sets the Bukkit material used here.
    NEXT-BUTTON: "&aɴᴇxᴛ" # Configures the next button option.
    BACK-BUTTON: "&aʙᴀᴄᴋ" # Configures the back button option.
    FIRST-PAGE-BUTTON: "&aꜰɪʀѕᴛ ᴘᴀɢᴇ" # Configures the first page button option.
    LAST-PAGE-BUTTON: "&aʟᴀѕᴛ ᴘᴀɢᴇ" # Configures the last page button option.
    NEXT-LORE:
      - "&fᴄʟɪᴄᴋ ᴛᴏ ɢᴏ ᴛᴏ ᴛʜᴇ ɴᴇxᴛ ᴘᴀɢᴇ"
    BACK-LORE:
      - "&fᴄʟɪᴄᴋ ᴛᴏ ɢᴏ ᴛᴏ ᴛʜᴇ ᴘʀᴇᴠɪᴏᴜѕ ᴘᴀɢᴇ"
    FIRST-PAGE-LORE:
      - "&fᴊᴜᴍᴘ ᴛᴏ ᴛʜᴇ ꜰɪʀѕᴛ ᴘᴀɢᴇ"
    LAST-PAGE-LORE:
      - "&fᴊᴜᴍᴘ ᴛᴏ ᴛʜᴇ ʟᴀѕᴛ ᴘᴀɢᴇ"

# UDS setup: Team-related menu layouts.
TEAM-MENUS:
  TEAM:
    TITLE: "&8ᴛᴇᴀᴍ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    MAX-ITEMS-PER-PAGE: 45 # Sets the allowed limit for this option.
    PLAYER-BUTTON:
      ONLINE-SYMBOL: "&a■" # Configures the online symbol option.
      OFFLINE-SYMBOL: "&4■" # Configures the offline symbol option.
      LORE: "&fᴄʟɪᴄᴋ ᴛᴏ ᴇᴅɪᴛ" # Sets the lore text shown for this item.
    SEARCH-BUTTON:
      TITLE: "&#6BF18Dѕᴇᴀʀᴄʜ" # Sets the title text shown for this menu or prompt.
      MATERIAL: OAK_SIGN # Sets the Bukkit material used here.
      SLOT: 45 # Sets the inventory slot used by this item.
      LORE:
        - "&fѕᴇᴀʀᴄʜ ꜰᴏʀ ᴛᴇᴀᴍ ᴍᴇᴍʙᴇʀѕ"
        - "&cɪɴ ᴅᴇᴠᴇʟᴏᴘᴍᴇɴᴛ."
    SORT-BUTTON:
      TITLE: "&aѕᴏʀᴛ" # Sets the title text shown for this menu or prompt.
      MATERIAL: HOPPER # Sets the Bukkit material used here.
      SLOT: 46 # Sets the inventory slot used by this item.
      SELECTED-PREFIX: "&a" # Configures the selected prefix option.
      UNSELECTED-PREFIX: "&f" # Configures the unselected prefix option.
      SYMBOL: "▪" # Sets the text format used by this option.
    REFRESH-BUTTON:
      TITLE: "&#6BF18Dᴛᴇᴀᴍ {team_name}" # Sets the title text shown for this menu or prompt.
      MATERIAL: IRON_HELMET # Sets the Bukkit material used here.
      SLOT: 49 # Sets the inventory slot used by this item.
      LORE:
        - "&fᴄʟɪᴄᴋ ᴛᴏ ʀᴇꜰʀᴇѕʜ"
