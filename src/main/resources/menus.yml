    HOME-BUTTON:
      TITLE: "&#6BF18Dᴛᴇᴀᴍ ʜᴏᴍᴇ" # Sets the title text shown for this menu or prompt.
      MATERIAL: WHITE_BANNER # Sets the Bukkit material used here.
      SLOT: 52 # Sets the inventory slot used by this item.
