# UDS setup: Spawner stacking, anti-ESP behavior, GUI layout, and entity type settings.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Options: true or false
  ACCESS_MODE: OWNER_ONLY # Options: OWNER_ONLY, OWNER_AND_TEAM, PUBLIC
  ALLOW_STEALING: false # If true, players can break and steal spawners placed by others.
  GENERATION_INTERVAL_SECONDS: 5 # Sets how often this task or update runs.
  PROCESS_ONLY_LOADED_CHUNKS: true # Process Only Loaded Chunks setting.
  REQUIRE_PLAYER_NEARBY: false # Require Player Nearby setting.
  PLAYER_NEARBY_RADIUS: 16 # Numeric value for distance or time
  MAX_STACK_PER_BLOCK: 100000 # Numeric value (integer)
  STORAGE_CAP_PER_LOOT_KEY: 1000000 # Storage Cap Per Loot Key setting.
  DROP_ON_BREAK_IF_INVENTORY_FULL: true # Drop On Break If Inventory Full setting.
  HOPPER_EXTRACTION:
    ENABLED: false # If true, hoppers placed underneath spawners will pull items out of spawner storage.
    AMOUNT_PER_CYCLE: 64 # The maximum amount of items per loot type to transfer to the hopper below per generation cycle.

# UDS setup: Spawner anti-ESP behavior and visibility protections.
ANTI_ESP:
  ENABLED: true # Options: true or false
  REVEAL_RADIUS: 7 # Numeric value for distance or time
  OWNER_SEE_RADIUS: 9 # Numeric value for distance or time
  TRACKING_RADIUS: 128 # Numeric value for distance or time
  REQUIRE_LINE_OF_SIGHT: true # Require Line Of Sight setting.
  STAFF_BYPASS_PERMISSION: "ultimatedonutsmp.admin.spawner.seeall" # Permission node (e.g., ultimatedonutsmp.admin)
  CAMOUFLAGE:
    OVERWORLD: DEEPSLATE # Overworld setting.
    NETHER: NETHERRACK # Nether setting.
    THE_END: END_STONE # The End setting.

# UDS setup: Menu title, rows, slots, buttons, and item layout for this feature.
GUI:
  STORAGE:
    TITLE: "&8{mob} ѕᴘᴀᴡɴᴇʀѕ - {page}/{max_page}" # Text string (supports & color codes)
    SIZE: 54 # Inventory size in slots (multiple of 9, max 54)
    ITEMS_PER_PAGE: 45 # Items Per Page setting.
  PANEL:
    TITLE: "&8ѕᴘᴀᴡɴᴇʀѕ - {world}" # Text string (supports & color codes)
    SIZE: 54 # Inventory size in slots (multiple of 9, max 54)
  WORLD_LIST:
    TITLE: "&8ѕᴘᴀᴡɴᴇʀѕ ᴘᴀɴᴇʟ" # Text string (supports & color codes)
    SIZE: 27 # Inventory size in slots (multiple of 9, max 54)

