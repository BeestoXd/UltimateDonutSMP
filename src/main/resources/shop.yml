# UDS setup: Shop category menus, sell/buy item definitions, and navigation buttons.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Optional favorites and Auction House information in the normal shop GUI.
SHOP-GUI:
  SHOW-AUCTION-PRICE: true # Shows the cheapest matching Auction House listing when Auction House is enabled.
  FAVORITES:
    ENABLED: true # When false, the Favorites button and favorite actions are completely hidden.
    BUTTON:
      SLOT: 26
      MATERIAL: NETHER_STAR
      NAME: "&dꜰᴀᴠᴏʀɪᴛᴇ ɪᴛᴇᴍѕ"
      LORE:
        - "&7ѕᴀᴠᴇᴅ ɪᴛᴇᴍѕ: &f{count}"
        - "&eᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡѕᴇ ꜰᴀᴠᴏʀɪᴛᴇѕ"
    MENU:
      TITLE: "&8ꜰᴀᴠᴏʀɪᴛᴇ ѕʜᴏᴘ ɪᴛᴇᴍѕ"
      SIZE: 54
      ITEMS-PER-PAGE: 45
      BACK-BUTTON-SLOT: 45
      FIRST-PAGE-SLOT: 46
      PREVIOUS-PAGE-SLOT: 47
      PAGE-INFO-SLOT: 49
      NEXT-PAGE-SLOT: 51
      LAST-PAGE-SLOT: 52
  ITEM:
    LORE:
      - "&7ѕʜᴏᴘ ᴘʀɪᴄᴇ: {shop_price}"
      - "{auction_line}"
      - ""
      - "{favorite_line}"
      - "&eʟᴇꜰᴛ-ᴄʟɪᴄᴋ ᴛᴏ ʙᴜʏ ꜰʀᴏᴍ ᴛʜᴇ ѕʜᴏᴘ"
      - "{auction_action}"
      - "{favorite_action}"
    AUCTION: "&7ʙᴇѕᴛ ᴀᴜᴄᴛɪᴏɴ: {auction_price} &8({auction_amount} ɪᴛᴇᴍѕ, {auction_unit_price} ᴇᴀᴄʜ)"
    NO-AUCTION: "&8ʙᴇѕᴛ ᴀᴜᴄᴛɪᴏɴ: ᴜɴᴀᴠᴀɪʟᴀʙʟᴇ"
    AUCTION-ACTION: "&bʀɪɢʜᴛ-ᴄʟɪᴄᴋ ᴛᴏ ʙᴜʏ ᴛʜᴇ ʙᴇѕᴛ ᴀᴜᴄᴛɪᴏɴ"
    NO-AUCTION-ACTION: ""
    FAVORITE-ACTION: "&dѕʜɪꜰᴛ-ᴄʟɪᴄᴋ ᴛᴏ ᴛᴏɢɢʟᴇ ꜰᴀᴠᴏʀɪᴛᴇ"
    FAVORITE-ON: "&d★ ꜰᴀᴠᴏʀɪᴛᴇ"
    FAVORITE-OFF: "&7☆ ɴᴏᴛ ꜰᴀᴠᴏʀɪᴛᴇᴅ"
  PAGE:
    NAME: "&eᴘᴀɢᴇ {page}&7/&e{pages}"
    ITEMS: "&fɪᴛᴇᴍѕ: &7{items}"
  EMPTY:
    CATEGORIES:
      NAME: "&cɴᴏ ѕʜᴏᴘ ᴄᴀᴛᴇɢᴏʀɪᴇѕ"
      LORE:
        - "&7ɴᴏ ᴇɴᴀʙʟᴇᴅ ᴄᴀᴛᴇɢᴏʀɪᴇѕ ᴀʀᴇ ᴄᴏɴꜰɪɢᴜʀᴇᴅ."
    ITEMS:
      NAME: "&cɴᴏ ѕʜᴏᴘ ɪᴛᴇᴍѕ"
      LORE:
        - "&7ɴᴏ ᴇɴᴀʙʟᴇᴅ ɪᴛᴇᴍѕ ᴀʀᴇ ᴄᴏɴꜰɪɢᴜʀᴇᴅ ɪɴ ᴛʜɪѕ ᴄᴀᴛᴇɢᴏʀʏ."
    FAVORITES:
      NAME: "&cɴᴏ ꜰᴀᴠᴏʀɪᴛᴇ ɪᴛᴇᴍѕ"
      LORE:
        - "&7ѕʜɪꜰᴛ-ᴄʟɪᴄᴋ ᴀɴ ɪᴛᴇᴍ ɪɴ ᴛʜᴇ ѕʜᴏᴘ"
        - "&7ᴛᴏ ᴀᴅᴅ ɪᴛ ᴛᴏ ᴛʜɪѕ ᴍᴇɴᴜ."
  MESSAGES:
    PLAYER-ONLY: "&cᴏɴʟʏ ᴘʟᴀʏᴇʀѕ ᴄᴀɴ ᴜѕᴇ ᴛʜɪѕ ᴄᴏᴍᴍᴀɴᴅ."
    NO-RELOAD-PERMISSION: "&cyou do not have permission to reload shop settings."
    RELOADED: "&aѕʜᴏᴘ ᴄᴏɴꜰɪɢᴜʀᴀᴛɪᴏɴ ʀᴇʟᴏᴀᴅᴇᴅ."
    USAGE: "&cᴜѕᴀɢᴇ: /shop [ʀᴇʟᴏᴀᴅ]"
    FAVORITE-ADDED: "&aᴀᴅᴅᴇᴅ &f{item}&a ᴛᴏ ѕʜᴏᴘ ꜰᴀᴠᴏʀɪᴛᴇѕ."
    FAVORITE-REMOVED: "&eʀᴇᴍᴏᴠᴇᴅ &f{item}&e ꜰʀᴏᴍ ѕʜᴏᴘ ꜰᴀᴠᴏʀɪᴛᴇѕ."

