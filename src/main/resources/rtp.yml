# UDS setup: Random teleport behavior, search safety, denied worlds, and RTP menu layout.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# You can enable/disable this feature
# UDS setup: Master enable flag for this feature file.
ENABLED: true # Enables or disables rtp.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  # Max players searching or waiting for RTP simultaneously. Values below 1 are treated as 1.
  PLAYERS-IN-RTP: 1 # Configures the players in rtp option.
  # Max tries to find a valid RTP location before failing. Values below 32 use 32.
  MAX-ATTEMPTS: 64 # Sets the allowed limit for this option.
  # Max chunk samples to inspect while looking for a valid location. Values below 64 use 64.
  MAX-CHUNK-SAMPLES: 128 # Sets the allowed limit for this option.
  # Ticks between chunk samples. Higher values reduce load but make RTP slower. Values below 8 use 8.
  ATTEMPT-INTERVAL-TICKS: 8 # Sets how often this task or update runs.
  # Generate new chunks while searching. Keep false for pregenerated RTP worlds to protect TPS.
  GENERATE-CHUNKS: false # Configures the generate chunks option.
  # Generate a limited number of chunks only after pregenerated/loaded RTP search cannot find a safe spot.
  GENERATE-FALLBACK-CHUNKS: true # Configures the generate fallback chunks option.
  # Chunk samples to try before limited fallback generation starts.
  GENERATE-FALLBACK-AFTER-SAMPLES: 48 # Configures the generate fallback after samples option.
  # Maximum fallback chunks allowed to generate during one RTP search. Set 0 to disable generation fallback.
  MAX-GENERATE-FALLBACK-SAMPLES: 32 # Sets the allowed limit for this option.
  # If chunk generation is disabled, allow loading already-generated chunks from disk.
  LOAD-GENERATED-CHUNKS: true # Configures the load generated chunks option.
  # If random samples cannot be prepared, try already-loaded chunks as a fallback.
  FALLBACK-TO-LOADED-CHUNKS: true # Configures the fallback to loaded chunks option.
  LOADED-CHUNK-FALLBACK-AFTER-SAMPLES: 32 # Configures the loaded chunk fallback after samples option.
  # Preload generated chunks around the RTP destination before teleporting to reduce post-teleport ping spikes.
  PRELOAD-TELEPORT-CHUNKS: true # Configures the preload teleport chunks option.
  # Chunk radius to preload around the destination. Values are clamped between 0 and 3.
  PRELOAD-RADIUS: 1 # Sets the radius used for this check or effect.
  # How many destination chunks to preload per tick.
  PRELOAD-CHUNKS-PER-TICK: 1 # Configures the preload chunks per tick option.
  # Maximum ticks to spend preloading before teleport continues anyway.
  PRELOAD-MAX-TICKS: 40 # Sets how often this task or update runs.
  # Temporarily lower player chunk send distance after RTP to avoid a large client chunk burst.
  POST-TELEPORT-CHUNK-THROTTLE: true # Configures the post teleport chunk throttle option.
  # Temporary per-player view distance after RTP. Values below 2 use 2.
  POST-TELEPORT-VIEW-DISTANCE: 4 # Configures the post teleport view distance option.
  # Temporary per-player simulation distance after RTP. Values below 2 use 2.
  POST-TELEPORT-SIMULATION-DISTANCE: 4 # Configures the post teleport simulation distance option.
  # Ticks before the player's original view/simulation distance is restored after RTP.
  POST-TELEPORT-THROTTLE-TICKS: 80 # Sets how often this task or update runs.

# UDS setup: Configure MESSAGES options for this file.
MESSAGES:
  # General RTP messages
  DISABLED: "&cКҖбҙӣбҙҳ ЙӘС• бҙ„бҙңКҖКҖбҙҮЙҙбҙӣКҹКҸ бҙ…ЙӘС•бҙҖКҷКҹбҙҮбҙ…." # Sets the message text for this response.
  COOLDOWN: "&cКҸбҙҸбҙң бҙ„бҙҖЙҙ'бҙӣ КҖбҙӣбҙҳ кң°бҙҸКҖ бҙҖЙҙбҙҸбҙӣКңбҙҮКҖ {remaining}С•." # Sets the message text for this response.
  MAX-PLAYERS: "&cбҙӣбҙҸбҙҸ бҙҚбҙҖЙҙКҸ бҙҳКҹбҙҖКҸбҙҮКҖС• бҙҖКҖбҙҮ бҙңС•ЙӘЙҙЙў КҖбҙӣбҙҳ КҖЙӘЙўКңбҙӣ ЙҙбҙҸбҙЎ. бҙҳКҹбҙҮбҙҖС•бҙҮ бҙӣКҖКҸ бҙҖЙўбҙҖЙӘЙҙ КҹбҙҖбҙӣбҙҮКҖ." # Sets the message text for this response.
  WORLD-NOT-EXIST: "&cбҙӣКңбҙҮ бҙЎбҙҸКҖКҹбҙ… бҙ…бҙҸбҙҮС• ЙҙбҙҸбҙӣ бҙҮxЙӘС•бҙӣ." # Sets the message text for this response.
  # RTP process messages
  SEARCHING: "&aС•бҙҮбҙҖКҖбҙ„КңЙӘЙҙЙў кң°бҙҸКҖ бҙҖ С•бҙҖкң°бҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ ЙӘЙҙ {world}..." # Sets the message text for this response.
  TP-WARNING: "&eбҙ…бҙҸ ЙҙбҙҸбҙӣ бҙҚбҙҸбҙ бҙҮ кң°бҙҸКҖ &b{countdown}&e С•бҙҮбҙ„бҙҸЙҙбҙ…С• бҙҸКҖ бҙӣКңбҙҮ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ бҙЎЙӘКҹКҹ КҷбҙҮ бҙ„бҙҖЙҙбҙ„бҙҮКҹбҙҮбҙ…." # Sets the message text for this response.
  SEARCH-ACTIONBAR: "&7С•бҙҮбҙҖКҖбҙ„КңЙӘЙҙЙў {world}... &b{elapsed}С•" # Sets the message text for this response.
  SEARCH-FOUND-ACTIONBAR: "&aС•бҙҖкң°бҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ кң°бҙҸбҙңЙҙбҙ… ЙӘЙҙ {world}! &7бҙҳКҖбҙҮбҙҳбҙҖКҖЙӘЙҙЙў бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ..." # Sets the message text for this response.
  SEARCH-FOUND-ACTIONBAR-HIDDEN: "&aС•бҙҖкң°бҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ кң°бҙҸбҙңЙҙбҙ… ЙӘЙҙ {world}! &7бҙҳКҖбҙҮбҙҳбҙҖКҖЙӘЙҙЙў бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ..."
  SAFE-LOCATION-FOUND: "&aС•бҙҖкң°бҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ кң°бҙҸбҙңЙҙбҙ… бҙҖбҙӣ: x:{x} КҸ:{y} бҙў:{z}" # Sets the message text for this response.
  SAFE-LOCATION-FOUND-HIDDEN: "&aС•бҙҖкң°бҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ кң°бҙҸбҙңЙҙбҙ…."
  MAX-ATTEMPTS: "&cбҙ„бҙҸбҙңКҹбҙ… ЙҙбҙҸбҙӣ кң°ЙӘЙҙбҙ… бҙҖ С•бҙҖкң°бҙҮ КҖбҙӣбҙҳ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ. &7бҙҖбҙӣбҙӣбҙҮбҙҚбҙҳбҙӣС•: &f{attempts}/{max_attempts} &8| &7С•бҙҖбҙҚбҙҳКҹбҙҮС•: &f{samples}/{max_samples}" # Sets the message text for this response.
  # Menu messages
  DESTINATION-DISABLED: "&cбҙӣКңЙӘС• КҖбҙӣбҙҳ бҙ…бҙҮС•бҙӣЙӘЙҙбҙҖбҙӣЙӘбҙҸЙҙ ЙӘС• бҙ„бҙңКҖКҖбҙҮЙҙбҙӣКҹКҸ бҙ…ЙӘС•бҙҖКҷКҹбҙҮбҙ…." # Sets the message text for this response.
  # Safety check messages (for debugging)
  UNSAFE-LOCATION: "&cбҙӣКңбҙҮ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ бҙҖбҙӣ x:{x} КҸ:{y} бҙў:{z} бҙЎбҙҖС• КҖбҙҮбҙҠбҙҮбҙ„бҙӣбҙҮбҙ…: {reason}" # Sets the message text for this response.

# Deny worlds from rtp command
# UDS setup: World names where this feature is blocked.
DENIED-WORLDS:
  - afk

# UDS setup: Per-world search radius, center, and safety settings.
WORLD-SETTINGS:
  world:
    MAX-RADIUS: 5000 # Sets the allowed limit for this option.
    MIN-RADIUS: 500 # Sets the allowed limit for this option.
    CENTER-X: 0 # Configures the center x option.
    CENTER-Z: 0 # Configures the center z option.
    COOLDOWN: 30 # Sets the cooldown before this action can run again.
  world_nether:
    MAX-RADIUS: 500 # Sets the allowed limit for this option.
    MIN-RADIUS: 50 # Sets the allowed limit for this option.
    CENTER-X: 0 # Configures the center x option.
    CENTER-Z: 0 # Configures the center z option.
    COOLDOWN: 30 # Sets the cooldown before this action can run again.
  world_the_end:
    MAX-RADIUS: 2000 # Sets the allowed limit for this option.
    MIN-RADIUS: 150 # Sets the allowed limit for this option.
    CENTER-X: 0 # Configures the center x option.
    CENTER-Z: 0 # Configures the center z option.
    COOLDOWN: 30 # Sets the cooldown before this action can run again.

