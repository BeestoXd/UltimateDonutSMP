      NAME: "&avanished" # Sets the name text used here.
      LORE:
        - "&7click to disable vanish"
    DISABLED:
      MATERIAL: "GRAY_DYE" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
      NAME: "&7unvanished" # Sets the name text used here.
      LORE:
        - "&7click to enable vanish"

  FREEZE:
    MATERIAL: "ICE" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
