# UDS setup: Staff mode permissions, tools, menus, persistence, vanish, and messages.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Staff mode behavior, permissions, persistence, and vanish options.
STAFF-MODE:
  ENABLED: true # Enables or disables staff mode.
  AUTO-VANISH-ON-ENABLE: false # Configures the auto vanish on enable option.
  PERSIST-ON-QUIT: true # Configures the persist on quit option.
  PERSIST-ON-RESTART: true # Configures the persist on restart option.
  LOCK-TOOLS: true # Configures the lock tools option.
  RESTORE-INVENTORY-ON-DISABLE: true # Configures the restore inventory on disable option.
  VANISH-ACTIONBAR:
    ENABLED: true # Enables or disables vanish actionbar.
    INTERVAL-TICKS: 40 # Sets how often this task or update runs.
    MESSAGE: "&avanished &7>> &fyou are hidden from regular players" # Configures the message option.
  STAFF-PERMISSION: "ultimatedonutsmp.staff.mode" # Sets the permission node required for this action.
  ADMIN-PERMISSION: "ultimatedonutsmp.admin.staffmode" # Sets the permission node required for this action.
  VANISH-PERMISSION: "ultimatedonutsmp.staff.mode.vanish" # Sets the permission node required for this action.
  BETTER-VIEW-PERMISSION: "ultimatedonutsmp.staff.mode.betterview" # Sets the permission node required for this action.
  STAFF-LIST-PERMISSION: "ultimatedonutsmp.staff.mode.stafflist" # Sets the permission node required for this action.
  RANDOM-TELEPORT-PERMISSION: "ultimatedonutsmp.staff.mode.randomtp" # Sets the permission node required for this action.
  SEE-VANISHED-PERMISSION: "ultimatedonutsmp.staff.mode.seevanished" # Sets the permission node required for this action.
  OTHERS-PERMISSION: "ultimatedonutsmp.staff.mode.others" # Sets the permission node required for this action.

  HOTBAR-SLOTS:
    VANISH: 0 # Configures the vanish option.
    FREEZE: 1 # Configures the freeze option.
    STAFF_LIST: 4 # Configures the staff list option.
    BETTER_VIEW: 7 # Configures the better view option.
    RANDOM_TELEPORT: 8 # Configures the random teleport option.

  BETTER-VIEW:
    ENABLE-NIGHT-VISION: true # Configures the enable night vision option.
    ENABLE-FLIGHT: true # Configures the enable flight option.
    AUTO-FLY: true # Configures the auto fly option.

  RANDOM-TELEPORT:
    EXCLUDE-STAFF: true # Configures the exclude staff option.
    EXCLUDE-VANISHED: true # Configures the exclude vanished option.
    EXCLUDE-FROZEN: false # Configures the exclude frozen option.
    EXCLUDE-DUELS: true # Configures the exclude duels option.
    EXCLUDE-FFA: true # Configures the exclude ffa option.

# UDS setup: Fakeplayer bait NPC settings and ESP detection alerts.
FAKE-PLAYER:
  ENABLED: true # Enables or disables fake player.
  TTL-SECONDS: 10 # Sets the time value in seconds.
  VIEW-RADIUS: 64.0 # Sets the radius used for this check or effect.
  DETECTION-RADIUS: 64.0 # Sets the radius used for this check or effect.
  DETECTION-ANGLE-DEGREES: 8.0 # Configures the detection angle degrees option.
  BLOCKED-CHECK-THRESHOLD: 3 # Configures the blocked check threshold option.
  CHECK-INTERVAL-TICKS: 5 # Sets how often this task or update runs.
  SPAWN-DELAY-TICKS: 20 # Sets how often this task or update runs.
  ALERT-COOLDOWN-SECONDS: 30 # Sets the cooldown before this action can run again.
  LOG-TO-CONSOLE: true # Configures the log to console option.
  SEND-OPTIONAL-SPAWN-PACKETS: false # Configures the send optional spawn packets option.
  SEND-SKIN-LAYERS-METADATA: true # Configures the send skin layers metadata option.
  SKIN-LAYERS-REFRESH-DELAY-TICKS: 5 # Sets how often this task or update runs.
  SKIN-LAYERS-METADATA-INDEX: -1 # Configures the skin layers metadata index option.
  SKIN-LAYERS-BITMASK: 127 # Configures the skin layers bitmask option.
  MESSAGES:
    NO-PERMISSION: "&cyou do not have permission." # Sets the message text for this response.
    PLAYER-ONLY: "&cᴏɴʟʏ ᴘʟᴀʏᴇʀѕ ᴄᴀɴ ᴜѕᴇ ᴛʜɪѕ ᴄᴏᴍᴍᴀɴᴅ." # Sets the message text for this response.
    DEPENDENCY-MISSING: "&cᴘʀᴏᴛᴏᴄᴏʟʟɪʙ ɪѕ ʀᴇǫᴜɪʀᴇᴅ ꜰᴏʀ /fakeplayer. ɪɴѕᴛᴀʟʟ ᴘʀᴏᴛᴏᴄᴏʟʟɪʙ ᴀɴᴅ ʀᴇѕᴛᴀʀᴛ ᴛʜᴇ ѕᴇʀᴠᴇʀ." # Sets the message text for this response.
    DISABLED: "&cꜰᴀᴋᴇᴘʟᴀʏᴇʀ ɪѕ ᴄᴜʀʀᴇɴᴛʟʏ ᴅɪѕᴀʙʟᴇᴅ." # Sets the message text for this response.
    INVALID-LOCATION: "&cᴜɴᴀʙʟᴇ ᴛᴏ ѕᴘᴀᴡɴ ᴀ ꜰᴀᴋᴇᴘʟᴀʏᴇʀ ᴀᴛ ʏᴏᴜʀ ᴄᴜʀʀᴇɴᴛ ʟᴏᴄᴀᴛɪᴏɴ." # Sets the message text for this response.
    SKIN-LOOKUP: "&7ᴄʜᴇᴄᴋɪɴɢ ѕᴋɪɴ ᴅᴀᴛᴀ..." # Sets the message text for this response.
    SKIN-NOT-READY: "&cѕᴋɪɴ ᴅᴀᴛᴀ ꜰᴏʀ &f{player}&c ɪѕ ɴᴏᴛ ʀᴇᴀᴅʏ. ʀᴇᴀᴘᴘʟʏ ʏᴏᴜʀ ѕᴋɪɴ ᴏʀ ʀᴇᴊᴏɪɴ, ᴛʜᴇɴ ᴛʀʏ ᴀɢᴀɪɴ." # Sets the message text for this response.
    SPAWNED: "&aꜰᴀᴋᴇᴘʟᴀʏᴇʀ &f{fakeplayer}&a ѕᴘᴀᴡɴᴇᴅ ꜰᴏʀ &f{ttl}ѕ&a." # Sets the message text for this response.
    ALERT:
      - "&8[&cꜰᴀᴋᴇᴘʟᴀʏᴇʀ&8] &f{player} &7ᴛʀᴀᴄᴋᴇᴅ ʙᴀɪᴛ &f{fakeplayer}&7 ᴛʜʀᴏᴜɢʜ ʙʟᴏᴄᴋѕ."
      - "&7ʟᴏᴄᴀᴛɪᴏɴ: &f{world} {x}, {y}, {z} &8| &7ᴄʀᴇᴀᴛᴇᴅ ʙʏ: &f{creator}"
    ALERT-HOVER: "&eᴄʟɪᴄᴋ ᴛᴏ ᴛᴇʟᴇᴘᴏʀᴛ ᴛᴏ &f{player}" # Sets the message text for this response.

