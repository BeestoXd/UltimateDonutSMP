# UDS setup: Staff mode permissions, tools, menus, persistence, vanish, and messages.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Staff mode behavior, permissions, persistence, and vanish options.
STAFF-MODE:
  ENABLED: true # Options: true or false
  AUTO-VANISH-ON-ENABLE: false # Auto Vanish On Enable setting.
  PERSIST-ON-QUIT: true # Persist On Quit setting.
  PERSIST-ON-RESTART: true # Persist On Restart setting.
  LOCK-TOOLS: true # Lock Tools setting.
  RESTORE-INVENTORY-ON-DISABLE: true # Restore Inventory On Disable setting.
  VANISH-ACTIONBAR:
    ENABLED: true # Options: true or false
    INTERVAL-TICKS: 40 # Sets how often this task or update runs.
    MESSAGE: "&avanished &7>> &fyou are hidden from regular players" # Message setting.
  STAFF-PERMISSION: "ultimatedonutsmp.staff.mode" # Permission node (e.g., ultimatedonutsmp.admin)
  ADMIN-PERMISSION: "ultimatedonutsmp.admin.staffmode" # Numeric value (integer)
  VANISH-PERMISSION: "ultimatedonutsmp.staff.mode.vanish" # Permission node (e.g., ultimatedonutsmp.admin)
  BETTER-VIEW-PERMISSION: "ultimatedonutsmp.staff.mode.betterview" # Permission node (e.g., ultimatedonutsmp.admin)
  STAFF-LIST-PERMISSION: "ultimatedonutsmp.staff.mode.stafflist" # Permission node (e.g., ultimatedonutsmp.admin)
  RANDOM-TELEPORT-PERMISSION: "ultimatedonutsmp.staff.mode.randomtp" # Permission node (e.g., ultimatedonutsmp.admin)
  SEE-VANISHED-PERMISSION: "ultimatedonutsmp.staff.mode.seevanished" # Permission node (e.g., ultimatedonutsmp.admin)
  OTHERS-PERMISSION: "ultimatedonutsmp.staff.mode.others" # Permission node (e.g., ultimatedonutsmp.admin)

  HOTBAR-SLOTS:
    VANISH: 0 # Vanish setting.
    FREEZE: 1 # Freeze setting.
    STAFF_LIST: 4 # Staff List setting.
    BETTER_VIEW: 7 # Better View setting.
    RANDOM_TELEPORT: 8 # Random Teleport setting.

  BETTER-VIEW:
    ENABLE-NIGHT-VISION: true # Enable Night Vision setting.
    ENABLE-FLIGHT: true # Enable Flight setting.
    AUTO-FLY: true # Auto Fly setting.

  RANDOM-TELEPORT:
    EXCLUDE-STAFF: true # Exclude Staff setting.
    EXCLUDE-VANISHED: true # Exclude Vanished setting.
    EXCLUDE-FROZEN: false # Exclude Frozen setting.
    EXCLUDE-DUELS: true # Exclude Duels setting.
    EXCLUDE-FFA: true # Exclude Ffa setting.

# UDS setup: Fakeplayer bait NPC settings and ESP detection alerts.
FAKE-PLAYER:
  ENABLED: true # Options: true or false
  TTL-SECONDS: 10 # Sets the time value in seconds.
  VIEW-RADIUS: 64.0 # Numeric value for distance or time
  DETECTION-RADIUS: 64.0 # Numeric value for distance or time
  DETECTION-ANGLE-DEGREES: 8.0 # Detection Angle Degrees setting.
  BLOCKED-CHECK-THRESHOLD: 3 # Blocked Check Threshold setting.
  CHECK-INTERVAL-TICKS: 5 # Sets how often this task or update runs.
  SPAWN-DELAY-TICKS: 20 # Sets how often this task or update runs.
  ALERT-COOLDOWN-SECONDS: 30 # Sets the cooldown before this action can run again.
  LOG-TO-CONSOLE: true # Log To Console setting.
  SEND-OPTIONAL-SPAWN-PACKETS: false # Send Optional Spawn Packets setting.
  SEND-SKIN-LAYERS-METADATA: true # Send Skin Layers Metadata setting.
  SKIN-LAYERS-REFRESH-DELAY-TICKS: 5 # Sets how often this task or update runs.
  SKIN-LAYERS-METADATA-INDEX: -1 # Skin Layers Metadata Index setting.
  SKIN-LAYERS-BITMASK: 127 # Skin Layers Bitmask setting.
  MESSAGES:
    NO-PERMISSION: "&cyou do not have permission." # Sets the message text for this response.
    PLAYER-ONLY: "&cᴏɴʟʏ ᴘʟᴀʏᴇʀѕ ᴄᴀɴ ᴜѕᴇ ᴛʜɪѕ ᴄᴏᴍᴍᴀɴᴅ." # Sets the message text for this response.
    DEPENDENCY-MISSING: "&cᴘʀᴏᴛᴏᴄᴏʟʟɪʙ ɪѕ ʀᴇǫᴜɪʀᴇᴅ ꜰᴏʀ /fakeplayer. ɪɴѕᴛᴀʟʟ ᴘʀᴏᴛᴏᴄᴏʟʟɪʙ ᴀɴᴅ ʀᴇѕᴛᴀʀᴛ ᴛʜᴇ ѕᴇʀᴠᴇʀ." # Sets the message text for this response.
    DISABLED: "&cꜰᴀᴋᴇᴘʟᴀʏᴇʀ ɪѕ ᴄᴜʀʀᴇɴᴛʟʏ ᴅɪѕᴀʙʟᴇᴅ." # Sets the message text for this response.
    INVALID-LOCATION: "&cᴜɴᴀʙʟᴇ ᴛᴏ ѕᴘᴀᴡɴ ᴀ ꜰᴀᴋᴇᴘʟᴀʏᴇʀ ᴀᴛ ʏᴏᴜʀ ᴄᴜʀʀᴇɴᴛ ʟᴏᴄᴀᴛɪᴏɴ." # Sets the message text for this response.
    SKIN-LOOKUP: "&7ᴄʜᴇᴄᴋɪɴɢ ѕᴋɪɴ ᴅᴀᴛᴀ..." # Sets the message text for this response.
    SKIN-NOT-READY: "&cѕᴋɪɴ ᴅᴀᴛᴀ ꜰᴏʀ &f{player}&c ɪѕ ɴᴏᴛ ʀᴇᴀᴅʏ. ʀᴇᴀᴘᴘʟʏ ʏᴏᴜʀ ѕᴋɪɴ ᴏʀ ʀᴇᴊᴏɪɴ, ᴛʜᴇɴ ᴛʀʏ ᴀɢᴀɪɴ." # Sets the message text for this response.
    SPAWNED: "&aꜰᴀᴋᴇᴘʟᴀʏᴇʀ &f{fakeplayer}&a ѕᴘᴀᴡɴᴇᴅ ꜰᴏʀ &f{ttl}ѕ&a." # Sets the message text for this response.
    ALERT:
      - "&8[&cꜰᴀᴋᴇᴘʟᴀʏᴇʀ&8] &f{player} &7ᴛʀᴀᴄᴋᴇᴅ ʙᴀɪᴛ &f{fakeplayer}&7 ᴛʜʀᴏᴜɢʜ ʙʟᴏᴄᴋѕ."
      - "&7ʟᴏᴄᴀᴛɪᴏɴ: &f{world} {x}, {y}, {z} &8| &7ᴄʀᴇᴀᴛᴇᴅ ʙʏ: &f{creator}"
    ALERT-HOVER: "&eᴄʟɪᴄᴋ ᴛᴏ ᴛᴇʟᴇᴘᴏʀᴛ ᴛᴏ &f{player}" # Sets the message text for this response.

