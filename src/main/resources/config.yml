# UDS setup: Core UltimateDonutSMP systems, feature toggles, global limits, and command switches.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Global language used for player-facing plugin text.
LANGUAGE:
  ACTIVE: "en_US"
  FALLBACK: "en_US"

FEATURES:
  HIDE: true
  SAFETY:
    ENABLED: true

# UDS setup: Saved global locations used by spawn, AFK, and location-based systems.
LOCATIONS:
  SPAWN-LOCATION: "" # Spawn Location setting.
  AFK-LOCATION: "" # Afk Location setting.

# UDS setup: Portal behavior, combat blocking, holograms, and per-portal overrides.
PORTAL-SYSTEM:
  ENABLED: true # Options: true or false
  BLOCK-IN-COMBAT: true # Options: true or false
  DEFAULT-TRIGGER-COOLDOWN-MS: 1500 # Sets the cooldown before this action can run again.
  POST-TELEPORT-GRACE-MS: 2000 # Post Teleport Grace Ms setting.
  HOLOGRAM:
    ENABLED: true # Options: true or false
    DEFAULT-REGION: "na east" # Sets the default value used when none is selected.
    DEFAULT-SERVER-ID: "" # Sets the default value used when none is selected.
    # Optional per-portal overrides. Keys must match /portalmanager portal ids.
    # Use SERVER-ID values from network.yml -> NETWORK-STATUS.SERVERS.
    PORTALS:
      # overworld_na:
      #   REGION: "NA East"
      #   SERVER-ID: "smp-na"
      #   LINES:
      #     - "&#55FF55{portal}"
      #     - "&7Region &#55FF55{region}"
      #     - ""
      #     - "&#55FF55<total_player> Players"
      # overworld_eu:
      #   REGION: "EU West"
      #   SERVER-ID: "smp-eu"
      #   LINES:
      #     - "&#55AAFF{portal}"
      #     - "&7Region &#55AAFF{region}"
      #     - ""
      #     - "&#55AAFF<total_player> Players"
    OFFSET-Y: 1.2 # Offset Y setting.
    SET-HERE-OFFSET-Y: 1.6 # Set Here Offset Y setting.
    LINE-SPACING: 0.27 # Line Spacing setting.
    UPDATE-TICKS: 40 # Sets how often this task or update runs.
    LINES:
      - "&f{portal}"
      - "&7region {region}"
      - ""
      - "&f<total_player> players"

# Settings
# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  RESPAWN-ON-BED: false # Respawn On Bed setting.
  TELEPORT-SPAWN-ON-FIRST-JOIN: true # Configures teleport to spawn on first join.
  CHAINMAIL-ON-RESPAWN: true # Chainmail On Respawn setting.
  CHAINMAIL-RESPAWN-ITEMS:
    - MATERIAL: STONE_SWORD
      AMOUNT: 1
    - MATERIAL: CHAINMAIL_HELMET
      NAME: "&echainmail helmet"
      AMOUNT: 1
    - MATERIAL: CHAINMAIL_CHESTPLATE
      NAME: "&echainmail chestplate"
      AMOUNT: 1
    - MATERIAL: CHAINMAIL_LEGGINGS
      NAME: "&echainmail leggings"
      AMOUNT: 1
    - MATERIAL: CHAINMAIL_BOOTS
      NAME: "&echainmail boots"
      AMOUNT: 1
    - MATERIAL: COOKED_BEEF
      AMOUNT: 16
  HOME-DEFAULT: 5 # Home Default setting.
  SHARDS-PER-KILL: 1 # Shards Per Kill setting.
  SHARDS-PER-KILL-MIN: "" # Optional inclusive minimum; blank keeps the legacy SHARDS-PER-KILL value.
  SHARDS-PER-KILL-MAX: "" # Optional inclusive maximum; blank keeps the legacy SHARDS-PER-KILL value.
  SHARDS-KILL-MESSAGE: "&# Shards Kill Message setting.
  MONEY-PER-DEFAULT: 1000.0 # Money Per Default setting.
  SELL-MESSAGE: "&a+$%price%" # Sell Message setting.
  SPAWN-MENU: true # Spawn Menu setting.
  AFK-MENU: true # Afk Menu setting.
  WORTH-DEFAULT-VALUE: 1.0 # Sets the economy value used by this option.
  # Player Settings
  MOB-SPAWN-RADIUS: 50 # Numeric value for distance or time
  PHANTOM-SPAWN-RADIUS: 40 # Numeric value for distance or time

# UDS setup: Limits unsafe item metadata before UDS stores or reloads item data.
CRASH-PROTECTION:
  ENABLED: true # Options: true or false
  MAX-SERIALIZED-BYTES: 65536 # Numeric value (integer)
  MAX-DISPLAY-NAME-LENGTH: 256 # Text string (supports & color codes)
  MAX-LORE-LINES: 80 # Numeric value (integer)
  MAX-LORE-LINE-LENGTH: 512 # Numeric value (integer)
  MAX-BOOK-PAGES: 50 # Numeric value (integer)
  MAX-BOOK-PAGE-LENGTH: 1024 # Numeric value (integer)
  MAX-BOOK-TOTAL-CHARS: 16384 # Numeric value (integer)
  MAX-PERSISTENT-DATA-KEYS: 64 # Numeric value (integer)
  MAX-CONTAINER-DEPTH: 1 # Numeric value (integer)
  MAX-NESTED-CONTAINER-ITEMS: 54 # Numeric value (integer)
  BLOCK-NESTED-CONTAINERS: true # Block Nested Containers setting.

# UDS setup: Chat format, clickable names, filters, caps/repeat/link checks, and delays.
CHAT:
  FORMAT-ENABLED: true # Set false to let another plugin handle public chat formatting.
  FORMAT: "%player%: %message%" # Sets the text format used by this option.
  MESSAGE-COLORS:
    default: "&f" # Sets the default value used when none is selected.
    owner: "&# Owner setting.
  CLICKABLE-NAME:
    ENABLED: true # Options: true or false
    HOVER-TEXT:
      - "%luckperms_prefix%%player%"
      - "&7&m----------"
      - "&#00FC00&l$ &fmoney &#00FC00%economy_money%"
      - "&#FC0000⚔ &fkills &#FC0000%economy_kills%"
      - "&#FCE300⌚ &fplaytime &#FCE300%economy_playtime%"
      - "&#F97603☠ &fdeaths &#F97603%economy_deaths%"
      - "&#A303F9★ &fshards &#A303F9%economy_shards_short%"
      - "&7&m----------"
      - "&7click to view stats"
    SUGGEST-COMMAND: "/msg <player> " # Sets the command executed or suggested here.
  GLOBAL-CHAT-MUTED: false # Global Chat Muted setting.
  GLOBAL-CHAT-DELAY-ENABLED: false # Options: true or false
  GLOBAL-CHAT-DELAY: 3 # Global Chat Delay setting.
  MAX-DELAY-SECONDS: 30 # Numeric value (integer)
  CLEAR-LINES: 150 # Clear Lines setting.
  FILTER:
    ENABLED: true # Options: true or false
    BLOCK-MESSAGE: "&7please avoid using inappropriate words." # Block Message setting.
    WORDS:
      - "fuck"
      - "shit"
      - "bitch"
    LANGUAGE:
      ENABLED: false # Options: true or false
      ALLOWED-ALPHABETS:
        - "LATIN"
        - "NUMBERS"
        - "SYMBOLS"
      BLOCK-MESSAGE: "&cyour message contains characters that are not allowed on this server." # Block Message setting.
    CAPS:
      ENABLED: false # Options: true or false
      PERCENTAGE: 70 # Percentage setting.
      MIN-LENGTH: 5 # Numeric value (integer)
      BLOCK-MESSAGE: "&cplease avoid using too many capital letters." # Block Message setting.
    ANTI-REPEAT:
      ENABLED: false # Options: true or false
      BLOCK-MESSAGE: "&cyou cannot repeat the same message!" # Block Message setting.
    ANTI-LINK:
      ENABLED: false # Options: true or false
      ALLOWED:
        - "google.com"
        - "youtube.com"
      BLOCK-MESSAGE: "&clinks are not allowed in the chat!" # Block Message setting.
    LENGTH:
      MIN:
        ENABLED: false # Options: true or false
        VALUE: 1 # Sets the economy value used by this option.
        BLOCK-MESSAGE: "&cyour message is too short! (min: %min%)" # Block Message setting.
      MAX:
        ENABLED: false # Options: true or false
        VALUE: 100 # Sets the economy value used by this option.
        BLOCK-MESSAGE: "&cyour message is too long! (max: %max%)" # Block Message setting.

# UDS setup: AFK detection timing, locations, cuboid integration, and AFK messages.
AFK-SYSTEM:
  ENABLED: true # Options: true or false
  TIME: 180 # Time setting.
  SPAWN-CUBOID-NAME: "spawn" # Sets the name text used here.
  AFK-CUBOID-NAME: "" # Sets the name text used here.
  MESSAGE: "&7you have been moved to the AFK area for being inactive in the spawn." # Message setting.

# UDS setup: Maps systems such as spawn or AFK to named cuboid regions.
CUBOID-BINDS:
  SPAWN: [] # Spawn setting.
  AFK: [] # Afk setting.

# UDS setup: Controls optional worth text shown on items.
WORTH-LORE:
  ENABLED: true # Options: true or false
  FORMAT: "&7worth: &a$%price%" # Sets the text format used by this option.

# UDS setup: Adjusts end crystal damage behavior when enabled.
END-CRYSTAL:
  ENABLED: false # Options: true or false
  DAMAGE: 2.0 # Damage setting.

# UDS setup: Controls crystal placement/break cooldowns and valid placement bases.
FAST-CRYSTALS:
  ENABLED: true # Options: true or false
  DEFAULT-PLAYER-STATE: true # Sets the default value used when none is selected.
  EXCLUDED-WORLDS:
    - "duels"

  PLACE:
    ENABLED-COOLDOWN-TICKS: 0 # Sets the cooldown before this action can run again.
    DISABLED-COOLDOWN-TICKS: 8 # Sets the cooldown before this action can run again.
    DEBOUNCE-MS: 40 # Debounce Ms setting.
    REQUIRE-VALID-BASE: true # Require Valid Base setting.
    VALID-BASES:
      - "OBSIDIAN"
      - "BEDROCK"
    REQUIRE-AIR-ABOVE: true # Require Air Above setting.
    REQUIRE-AIR-TWO-ABOVE: true # Require Air Two Above setting.

  BREAK:
    CLEAR-COOLDOWN-AFTER-HIT: true # Sets the cooldown before this action can run again.
  
# UDS setup: Adjusts respawn anchor damage behavior when enabled.
RESPAWN-ANCHOR:
  ENABLED: false # Options: true or false
  DAMAGE: 2.0 # Damage setting.

# UDS setup: Adjusts TNT damage behavior when enabled.
TNT:
  ENABLED: true # Options: true or false
  DAMAGE: 1.0 # Multiplier for TNT damage.

# UDS setup: Adjusts TNT Minecart damage behavior when enabled.
TNT-MINECART:
  ENABLED: true # Options: true or false
  DAMAGE: 1.0 # Multiplier for TNT Minecart damage.

# UDS setup: Adjusts other explosion damage (e.g. creepers, beds) behavior when enabled.
OTHER-EXPLOSIONS:
  ENABLED: true # Options: true or false
  DAMAGE: 1.0 # Multiplier for other explosion damage.

# UDS setup: Custom ender chest rows, access rules, save timing, and display title.
ENDER-CHEST:
  SIX-ROW: true # Six Row setting.

# Lunar client modules
# UDS setup: Lunar Client integration settings such as rich presence and team view.
LUNAR-CLIENT:
  RICH-PRESENCE:
    # Requires the official Lunar Client Apollo plugin and a public server listed in Lunar ServerMappings.
    ENABLED: true # Options: true or false
    UPDATE: 1 # Update setting.
    PLAYER-STATE: "playing" # Player State setting.
    GAME-STATE: "playing" # Game State setting.
    GAME-NAME: "economy" # Sets the name text used here.
    VARIANT: "%economy_username% ($%economy_nicestMoney%)" # Variant setting.
    WORLD-NAME: "economy" # Sets the world name used by this option.
    SUB-SERVER-NAME: "SMP" # Sets the name text used here.
    TEAM-CURRENT-SIZE: "{team_size}" # Inventory size in slots (multiple of 9, max 54)
    TEAM-MAX-SIZE: "{team_max_size}" # Inventory size in slots (multiple of 9, max 54)
    MAX-FIELD-LENGTH: 128 # Numeric value (integer)
  TEAM-VIEW:
    ENABLED: true # Options: true or false
    UPDATE: 20 # Update setting.

# UDS setup: Shard earning, boosters, menus, drops, cuboids, and passive generation.
SHARDS:
  # Legacy spawn shard settings. These are still used as a fallback when SHARDS.CUBOIDS.REGIONS is empty.
  EVERY: 1 # Every setting.
  AMOUNT: 1 # Sets the item amount used by this option.
  COUNTDOWN: "&7next shard in &# Countdown setting.
  RECEIVED: "&# Received setting.
  RECEIVED-BOOSTED: "&# Received Boosted setting.
  CANCELLED-MESSAGE: "&cshard reward cancelled &7(left %cuboid% zone)" # Cancelled Message setting.
  RESET-ON-LEAVE: true # Reset On Leave setting.

  # Configurable shard cuboids. The cuboid area itself should already exist via /cuboid save <name>.
  CUBOIDS:
    REGIONS:
      spawn:
        ENABLED: false # Options: true or false
        BOUND: false # Bound setting.
        PRIORITY: 100 # Priority setting.
        CUBOID: "" # Cuboid setting.
        WORLD: "world" # Sets the world name used by this option.
        LOCATION: "" # Location setting.
        RADIUS: 16 # Numeric value for distance or time
        INTERVAL: 60 # Sets how often this task or update runs.
        AMOUNT: 1 # Sets the item amount used by this option.
        COUNTDOWN-MESSAGE: "&7next shard in &# Countdown Message setting.
        REWARD-MESSAGE: "&# Reward Message setting.
        BOOSTED-REWARD-MESSAGE: "&# Boosted Reward Message setting.
        LEAVE-MESSAGE: "&cshard reward cancelled &7(left %cuboid% zone)" # Leave Message setting.
        AFK-TIME: 120 # Afk Time setting.
        AFK-CUBOID: "" # Afk Cuboid setting.
        AFK-LOCATION: "" # Afk Location setting.
        AFK-MESSAGE: "&7you have been moved to the AFK area for being inactive in the shard zone." # Afk Message setting.
        TELEPORT-ON-AFK: true # Teleport On Afk setting.
        EXCLUDED-WORLDS:
          - "duels"
        RECENT-MOVEMENT-WINDOW: 15 # Recent Movement Window setting.
        MIN-MOVEMENT-BLOCKS: 5 # Sets the required block movement in the cycle. Set to 0 to disable.
        RESET-ON-LEAVE: true # Reset On Leave setting.
        PAUSED-MESSAGE: "&emove to keep earning shards &7(%movement%/%required_movement%)" # Paused Message setting.
        AFK-PAUSED-MESSAGE: "&cyou are AFK. move to resume shard gain" # Afk Paused Message setting.
        EXCLUDED-WORLD-MESSAGE: "&cshards are disabled in this world" # Excluded World Message setting.

  # Passive "everywhere" reward (ShardTask, runs every minute)
  EVERYWHERE:
    ENABLED: false # Options: true or false
    EVERY: 3 # Every setting.
    AMOUNT: 1 # Sets the item amount used by this option.
    REQUIRED-PERMISSION: "ultimatedonutsmp.shards.everywhere" # Permission node (e.g., ultimatedonutsmp.admin)
    RECENT-MOVEMENT-WINDOW: 15 # Recent Movement Window setting.
    DISABLE-WHILE-IN-SHARD-CUBOID: false # Disable While In Shard Cuboid setting.
    RECEIVED: "&# Received setting.
    RECEIVED-BOOSTED: "&# Received Boosted setting.
    EXCLUDED-WORLDS:
      - "duels"

  # Multiplies both cuboid and everywhere shards while active.
  BOOSTER-MULTIPLIER: 4 # Booster Multiplier setting.

# UDS setup: Scheduled key-all rewards, notifications, and reward commands/items.
KEY-ALL:
  ENABLED: true # Options: true or false
  EVERY: 60 # Every setting.
  COMMANDS:
    - ""
  RANDOM-COMMANDS: false # If true, runs only one random command from the COMMANDS list instead of all.
  TYPE: "RANDOM" # Type setting.
  RANDOM:
    KEYS:
      common: 60 # Common setting.
      rare: 30 # Rare setting.
      epic: 10 # Epic setting.
  ONE-KEY-ONLY:
    KEY: "common" # Key setting.
  NOTIFICATION:
    ENABLED: true # Options: true or false
    MESSAGE:
      - ""
      - "&#00A4FCkey-all reward!"
      - "&fyou received &b{amount}x {crate}&f key."
      - ""

# UDS setup: Team limits, naming rules, homes, chat, invites, and team PvP settings.
TEAM:
  NAME-MIN-LENGTH: 3 # Text string (supports & color codes)
  NAME-MAX-LENGTH: 5 # Text string (supports & color codes)
  LIMIT-MEMBERS: 10 # Limit Members setting.

# UDS setup: Leaderboard formatting, refresh behavior, holograms, and stat categories.
LEADERBOARD:
  UPDATE: 10 # Update setting.
  NPC-REFRESH: 1 # Npc Refresh setting.

# UDS setup: Tablist header/footer, sorting, placeholders, groups, and refresh behavior.
TABLIST:
  ENABLED: true # Options: true or false
  LUCKPERMS-PRIORITY: true # Luckperms Priority setting.
  SHOW-TEAM-NAME: true # Sets the name text used here.
  ICON-MEDIA: "\U0001F4F9" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
  MEDIA-ICON-FORMAT: "&d<icon_media>" # Sets the text format used by this option.
  MEDIA-PLUS-FORMAT: "&#37BFF9+" # Sets the text format used by this option.
  MEDIA-BADGE-FORMAT: "<media_icon_badge><media_plus_badge>" # Sets the text format used by this option.
  MEDIA-BADGE-PERMISSION: "rank.media" # Permission node (e.g., ultimatedonutsmp.admin)
  MEDIA-PLUS-PERMISSION: "rank.media.plus" # Permission node (e.g., ultimatedonutsmp.admin)
  MEDIA-BADGE-INCLUDE-PERMISSION: "rank.media.include" # Permission node (e.g., ultimatedonutsmp.admin)
  NAME-FORMAT: "<media_badge>&f<nick>%team_suffix%" # Sets the text format used by this option.
  HEADER:
    - ''
    - '<#00ADFC>&lserver name</#00FCFC>'
    - '&f%online% players'
    - ''
  FOOTER:
    - ''
    - '   &#37BFF9/discord  /guide  /store   '
    - ''

# UDS setup: Performance-related toggles and cleanup/monitoring behavior.
OPTIMIZATION:
  ENABLED: true # Options: true or false
  MONITOR-INTERVAL-TICKS: 100 # Sets how often this task or update runs.
  TPS-WARN-THRESHOLD: 18.5 # Tps Warn Threshold setting.
  TPS-CRITICAL-THRESHOLD: 16.0 # Tps Critical Threshold setting.
  MSPT-WARN-THRESHOLD: 45.0 # Mspt Warn Threshold setting.
  MSPT-CRITICAL-THRESHOLD: 55.0 # Mspt Critical Threshold setting.
  RECOVERY-SAMPLES: 3 # Recovery Samples setting.
  LOG-STATE-CHANGES: true # Log State Changes setting.
  ADAPTIVE-TASKS:
    SCOREBOARD:
      ENABLED: true # Options: true or false
      WARN-MIN-INTERVAL-TICKS: 4 # Sets how often this task or update runs.
      CRITICAL-MIN-INTERVAL-TICKS: 10 # Sets how often this task or update runs.
    TABLIST:
      ENABLED: true # Options: true or false
      WARN-MIN-INTERVAL-TICKS: 80 # Sets how often this task or update runs.
      CRITICAL-MIN-INTERVAL-TICKS: 140 # Sets how often this task or update runs.
    LUNAR-TEAMMATES:
      ENABLED: true # Options: true or false
      WARN-MIN-INTERVAL-TICKS: 40 # Sets how often this task or update runs.
      CRITICAL-MIN-INTERVAL-TICKS: 100 # Sets how often this task or update runs.

# UDS setup: Entity cleanup timing, exclusions, warnings, and cleanup scope.
CLEAR-LAG:
  ENABLED: true # Options: true or false
  EVERY: 5 # Every setting.
  ANIMALS: true # Animals setting.
  MONSTERS: true # Monsters setting.
  DROPPED-ITEMS: true # Dropped Items setting.
  EXCLUDED-WORLDS:
    - "duels"
  EXCLUDE-NAMED: true # Set to true to prevent entities with custom names from being cleared.
  EXCLUDE-TAMED: true # Set to true to prevent tamed animals (dogs, cats, etc.) from being cleared.
  EXCLUDED-ENTITY-TYPES: [] # List of EntityTypes to exclude from clear-lag (e.g. VILLAGER, etc.)
  EXCLUDED-ITEM-MATERIALS: [] # List of Material names to exclude from clear-lag (e.g. DIAMOND, etc.)
    
# UDS setup: Combat timer, blocked commands, tagging, and combat feedback.
COMBAT-MANAGER:
  ENABLED: true # Options: true or false
  COOLDOWN: 16 # Sets the cooldown before this action can run again.
  KILL-ON-LOGOUT: false # Kill On Logout setting.
  ACTION-BAR: "&fcombat: &b${time}s" # Action Bar setting.
  # Get combat on:
  MOBS: false # If true, damage from mobs also puts players into combat.
  ENDER-CRYSTAL: true # Ender Crystal setting.
  ENDER-PEARL: true # Ender Pearl setting.
  RESPAWN-ANCHOR: true # Respawn Anchor setting.
  ANTI-STASIS-CHAMBER:
    ENABLED: true # Options: true or false
    MAX-DISTANCE: 500 # Numeric value (integer)
    PREVENT-WORLD-CHANGE: true # Prevent World Change setting.
  BLOCK-MESSAGE: "&cyou can't use this command in your current status." # Block Message setting.
  BLOCK-COMMANDS:
    - "/spawn"
    - "/afk"
    - "/rtp"
    - "/homes"
    - "/tpa"
  EXCLUDED-WORLDS:
    - "duels"

# UDS setup: RTP zone cuboid behavior, countdowns, titles, and teleport search area.
RTP-ZONE:
  ENABLED: true # Options: true or false
  CUBOID: "" # Cuboid setting.
  EVERY: 30 # Every setting.
  TITLE-FADE-OUT-TICKS: 10 # Sets how long the RTP title fades after a player leaves the zone.
  TITLE: "&c&lrtp zone" # Text string (supports & color codes)
  SUB-TITLE: "&fteleporting in %countdown%" # Text string (supports & color codes)
  CANCELLED-MESSAGE: "&crtp cancelled because you left the zone." # Cancelled Message setting.
  FAILED-MESSAGE: "&ccould not find a safe rtp zone location." # Failed Message setting.
  SUCCESS-MESSAGE: "" # Success Message setting.
  WORLD:
    NAME: "world" # Sets the name text used here.
    CENTER-X: 0 # Center X setting.
    CENTER-Z: 0 # Center Z setting.
    MIN-RADIUS: 500 # Numeric value (integer)
    MAX-RADIUS: 2000 # Numeric value (integer)

# UDS setup: Cooldown durations for teleport-based commands.
TELEPORT-COOLDOWN:
  HOME: 5 # Home setting.
  TEAM-HOME: 5 # Team Home setting.
  SPAWN: 5 # Spawn setting.
  AFK: 5 # Afk setting.
  TPA: 5 # Tpa setting.
  WARP: 5 # Warp setting.
  RTP: 5 # Rtp setting.

# UDS setup: Bounty limits, taxes, menus, and reward handling.
BOUNTY:
  EXCLUDED-WORLDS:
    - "duels"

