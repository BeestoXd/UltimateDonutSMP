  CHECK: "&bʜɪᴅᴇ ᴄʜᴇᴄᴋ\n&7ʀᴇᴀʟ ɴᴀᴍᴇ: &f{real}\n&7ᴀʟɪᴀѕ: &f{alias}\n&7ᴍᴏᴅᴇ: &f{mode}\n&7ѕᴋɪɴ: &f{skin}"
