# Hide privacy system: persistent scramble aliases and configured disguises.
ENABLED: true
COOLDOWN-SECONDS: 30
MAX-NAME-LENGTH: 16
STAFF-MARKER: "&8[&cH&8] "

SCRAMBLE:
  LENGTH: 10
  CHARACTERS: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_"
  OBFUSCATED: true

# Keys are used by /disguise <alias-key> <skin-key>.
ALIASES:
  mrbeast:
    NAME: "MrBeast"
    SKIN: mrbeast
  technoblade:
    NAME: "Technoblade"
    SKIN: technoblade
  dream:
    NAME: "Dream"
    SKIN: dream
  drdonutt:
    NAME: "DrDonutt"
    SKIN: drdonutt

# USERNAME is resolved asynchronously through the existing Mojang/SkinsRestorer skin pipeline.
SKINS:
  mrbeast:
    DISPLAY-NAME: "MrBeast"
    USERNAME: "MrBeast"
  technoblade:
    DISPLAY-NAME: "Technoblade"
    USERNAME: "Technoblade"
  dream:
    DISPLAY-NAME: "Dream"
    USERNAME: "Dream"
  drdonutt:
    DISPLAY-NAME: "DrDonutt"
    USERNAME: "DrDonutt"

GUI:
  MAIN:
    TITLE: "&8ʜɪᴅᴇ"
    SIZE: 27
  ALIASES:
    TITLE: "&8select a name - {page}/{pages}"
    SIZE: 54
  SKINS:
    TITLE: "&8ѕᴇʟᴇᴄᴛ ᴀ ѕᴋɪɴ - {page}/{pages}"
    SIZE: 54
  LIST:
    TITLE: "&8ʜɪᴅᴅᴇɴ ᴘʟᴀʏᴇʀѕ - {page}/{pages}"
    SIZE: 54

MESSAGES:
  PLAYER-ONLY: "&cᴏɴʟʏ ᴘʟᴀʏᴇʀѕ ᴄᴀɴ ᴜѕᴇ ᴛʜɪѕ ᴄᴏᴍᴍᴀɴᴅ."
  NO-PERMISSION: "&cyou do not have permission."
  DEPENDENCY-MISSING: "&cʜɪᴅᴇ ʀᴇǫᴜɪʀᴇѕ ᴘʀᴏᴛᴏᴄᴏʟʟɪʙ ᴛᴏ ʙᴇ ɪɴѕᴛᴀʟʟᴇᴅ ᴀɴᴅ ᴇɴᴀʙʟᴇᴅ."
  DISABLED: "&cᴛʜᴇ ʜɪᴅᴇ ꜰᴇᴀᴛᴜʀᴇ ɪѕ ᴄᴜʀʀᴇɴᴛʟʏ ᴅɪѕᴀʙʟᴇᴅ."
  IN-COMBAT: "&cʏᴏᴜ ᴄᴀɴɴᴏᴛ ᴄʜᴀɴɢᴇ ʏᴏᴜʀ ʜɪᴅᴇ ѕᴛᴀᴛᴇ ᴡʜɪʟᴇ ɪɴ ᴄᴏᴍʙᴀᴛ."
  COOLDOWN: "&cᴡᴀɪᴛ &f{seconds}ѕ &cʙᴇꜰᴏʀᴇ ᴄʜᴀɴɢɪɴɢ ʜɪᴅᴇ ᴀɢᴀɪɴ."
  ALREADY-HIDDEN: "&cʏᴏᴜ ᴀʀᴇ ᴀʟʀᴇᴀᴅʏ ᴜѕɪɴɢ ᴛʜᴀᴛ ʜɪᴅᴇ ɪᴅᴇɴᴛɪᴛʏ."
  NOT-HIDDEN: "&cᴛʜᴀᴛ ᴘʟᴀʏᴇʀ ɪѕ ɴᴏᴛ ʜɪᴅᴅᴇɴ."
  PLAYER-NOT-FOUND: "&cᴘʟᴀʏᴇʀ ɴᴏᴛ ꜰᴏᴜɴᴅ."
  INVALID-ALIAS: "&cᴛʜᴀᴛ ᴅɪѕɢᴜɪѕᴇ ᴀʟɪᴀѕ ɪѕ ɴᴏᴛ ᴄᴏɴꜰɪɢᴜʀᴇᴅ ᴏʀ ɪѕ ɪɴᴠᴀʟɪᴅ."
  INVALID-SKIN: "&cᴜɴᴀʙʟᴇ ᴛᴏ ʀᴇѕᴏʟᴠᴇ ᴛʜᴀᴛ ѕᴋɪɴ ɴᴀᴍᴇ ᴏʀ ᴜʀʟ."
