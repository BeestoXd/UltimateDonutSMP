# UDS setup: Discord webhook endpoints and cross-platform notification text.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Discord webhook URLs and payload templates.
WEBHOOKS:
  ENABLED: true # Options: true or false
  URL: "https://discord.com/api/webhooks/your_webhook_here" # Sets the external URL used by this integration.
  AVATAR_API: "https://visage.surgeplay.com/face/128/%uuid_no_dash%" # Sets the external URL used by this integration.
  MODEL_API: "https://visage.surgeplay.com/full/384/%uuid_no_dash%" # Sets the external URL used by this integration.
  BUST_API: "https://visage.surgeplay.com/bust/384/%uuid_no_dash%" # Sets the external URL used by this integration.

  MESSAGES:
    BAN:
      ENABLED: true # Sets the message text for this response.
      TITLE: "бҙҳКҹбҙҖКҸбҙҮКҖ КҷбҙҖЙҙЙҙбҙҮбҙ… - %player%" # Sets the message text for this response.
      COLOR: "#ff0000" # Sets the message text for this response.
      DESCRIPTION: | # Sets the multi-line message text for this response.
        :hammer: **бҙҳбҙңЙҙЙӘС•КңбҙҚбҙҮЙҙбҙӣ бҙӣКҸбҙҳбҙҮ:** КҷбҙҖЙҙ
        **бҙҳКҹбҙҖКҸбҙҮКҖ:** %player%
        **С•бҙӣбҙҖкң°кң°:** %staff%
        **КҖбҙҮбҙҖС•бҙҸЙҙ:** ||%reason%||
        **бҙ…бҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ:** %duration%
        **бҙ…бҙҖбҙӣбҙҮ:** %date%
        **ЙӘбҙ…:** `%id%`
      THUMBNAIL: "%skin_bust%" # Sets the message text for this response.
      AUTHOR_NAME: "КҷбҙҖЙҙ С•КҸС•бҙӣбҙҮбҙҚ" # Sets the message text for this response.
      FOOTER: "бҙҳбҙңЙҙЙӘС•КңбҙҚбҙҮЙҙбҙӣ ЙӘС•С•бҙңбҙҮбҙ… бҙ ЙӘбҙҖ С•бҙҮКҖбҙ бҙҮКҖ" # Sets the message text for this response.

    MUTE:
      ENABLED: true # Sets the message text for this response.
      TITLE: "бҙҳКҹбҙҖКҸбҙҮКҖ бҙҚбҙңбҙӣбҙҮбҙ… - %player%" # Sets the message text for this response.
      COLOR: "#ffff00" # Sets the message text for this response.
      DESCRIPTION: | # Sets the multi-line message text for this response.
        :mute: **бҙҳбҙңЙҙЙӘС•КңбҙҚбҙҮЙҙбҙӣ бҙӣКҸбҙҳбҙҮ:** бҙҚбҙңбҙӣбҙҮ
        **бҙҳКҹбҙҖКҸбҙҮКҖ:** %player%
        **С•бҙӣбҙҖкң°кң°:** %staff%
        **КҖбҙҮбҙҖС•бҙҸЙҙ:** ||%reason%||
        **бҙ…бҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ:** %duration%
        **бҙ…бҙҖбҙӣбҙҮ:** %date%
        **ЙӘбҙ…:** `%id%`
      THUMBNAIL: "%skin_bust%" # Sets the message text for this response.
      AUTHOR_NAME: "бҙҚбҙҸбҙ…бҙҮКҖбҙҖбҙӣЙӘбҙҸЙҙ С•КҸС•бҙӣбҙҮбҙҚ" # Sets the message text for this response.
      FOOTER: "бҙ„КңбҙҖбҙӣ КҖбҙҮС•бҙӣКҖЙӘбҙ„бҙӣЙӘбҙҸЙҙ бҙҖбҙҳбҙҳКҹЙӘбҙҮбҙ…" # Sets the message text for this response.

    WARN:
      ENABLED: true # Sets the message text for this response.
      TITLE: "бҙҳКҹбҙҖКҸбҙҮКҖ бҙЎбҙҖКҖЙҙбҙҮбҙ… - %player%" # Sets the message text for this response.
      COLOR: "#ffa500" # Sets the message text for this response.
      DESCRIPTION: | # Sets the multi-line message text for this response.
        :warning: **бҙҳбҙңЙҙЙӘС•КңбҙҚбҙҮЙҙбҙӣ бҙӣКҸбҙҳбҙҮ:** бҙЎбҙҖКҖЙҙЙӘЙҙЙў
        **бҙҳКҹбҙҖКҸбҙҮКҖ:** %player%
        **С•бҙӣбҙҖкң°кң°:** %staff%
        **КҖбҙҮбҙҖС•бҙҸЙҙ:** ||%reason%||
        **бҙ…бҙҖбҙӣбҙҮ:** %date%
        **ЙӘбҙ…:** `%id%`
      THUMBNAIL: "%skin_bust%" # Sets the message text for this response.
      AUTHOR_NAME: "бҙҚбҙҸбҙ…бҙҮКҖбҙҖбҙӣЙӘбҙҸЙҙ С•КҸС•бҙӣбҙҮбҙҚ" # Sets the message text for this response.
      FOOTER: "бҙЎбҙҖКҖЙҙЙӘЙҙЙў ЙӘС•С•бҙңбҙҮбҙ…" # Sets the message text for this response.

    KICK:
      ENABLED: true # Sets the message text for this response.
      TITLE: "бҙҳКҹбҙҖКҸбҙҮКҖ бҙӢЙӘбҙ„бҙӢбҙҮбҙ… - %player%" # Sets the message text for this response.
      COLOR: "#ff6347" # Sets the message text for this response.
      DESCRIPTION: | # Sets the multi-line message text for this response.
        :boot: **бҙҳбҙңЙҙЙӘС•КңбҙҚбҙҮЙҙбҙӣ бҙӣКҸбҙҳбҙҮ:** бҙӢЙӘбҙ„бҙӢ
        **бҙҳКҹбҙҖКҸбҙҮКҖ:** %player%
        **С•бҙӣбҙҖкң°кң°:** %staff%
        **КҖбҙҮбҙҖС•бҙҸЙҙ:** ||%reason%||
        **бҙ…бҙҖбҙӣбҙҮ:** %date%
      THUMBNAIL: "%skin_bust%" # Sets the message text for this response.
      AUTHOR_NAME: "бҙҚбҙҸбҙ…бҙҮКҖбҙҖбҙӣЙӘбҙҸЙҙ С•КҸС•бҙӣбҙҮбҙҚ" # Sets the message text for this response.
      FOOTER: "бҙҳКҹбҙҖКҸбҙҮКҖ бҙЎбҙҖС• КҖбҙҮбҙҚбҙҸбҙ бҙҮбҙ… кң°КҖбҙҸбҙҚ С•бҙҮКҖбҙ бҙҮКҖ" # Sets the message text for this response.

    BLACKLIST:
      ENABLED: true # Sets the message text for this response.
      TITLE: "бҙҳКҹбҙҖКҸбҙҮКҖ КҷКҹбҙҖбҙ„бҙӢКҹЙӘС•бҙӣбҙҮбҙ… - %player%" # Sets the message text for this response.
      COLOR: "#000000" # Sets the message text for this response.
      DESCRIPTION: | # Sets the multi-line message text for this response.
        :no_entry: **бҙҳбҙҮКҖбҙҚбҙҖЙҙбҙҮЙҙбҙӣ ЙҙбҙҮбҙӣбҙЎбҙҸКҖбҙӢ КҷбҙҖЙҙ**
        **бҙҳКҹбҙҖКҸбҙҮКҖ:** %player%
        **С•бҙӣбҙҖкң°кң°:** %staff%
        **КҖбҙҮбҙҖС•бҙҸЙҙ:** ||%reason%||
        **бҙ…бҙҖбҙӣбҙҮ:** %date%
        **ЙӘбҙ…:** `%id%`
        :exclamation: бҙӣКңЙӘС• ЙӘС• бҙҖ бҙҳбҙҮКҖбҙҚбҙҖЙҙбҙҮЙҙбҙӣ ЙҙбҙҮбҙӣбҙЎбҙҸКҖбҙӢ-бҙЎЙӘбҙ…бҙҮ КҷбҙҖЙҙ
      THUMBNAIL: "%skin_bust%" # Sets the message text for this response.
      AUTHOR_NAME: "С•бҙҮбҙ„бҙңКҖЙӘбҙӣКҸ С•КҸС•бҙӣбҙҮбҙҚ" # Sets the message text for this response.
      FOOTER: "КҷКҹбҙҖбҙ„бҙӢКҹЙӘС•бҙӣ бҙҮЙҙкң°бҙҸКҖбҙ„бҙҮбҙ…" # Sets the message text for this response.
