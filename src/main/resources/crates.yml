# UDS setup: Crate opening behavior and editable crate reward definitions.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  LIST-MENU:
    TITLE: "&8ᴄʀᴀᴛᴇѕ" # Text string (supports & color codes)
    SIZE: 27 # Inventory size in slots (multiple of 9, max 54)
    FILLER: "GRAY_STAINED_GLASS_PANE" # Filler setting.
    CONTENT-SLOTS: [10, 11, 12, 13, 14, 15, 16] # Content Slots setting.
    EMPTY-SLOT: 13 # Sets the inventory slot used by this item.
    EMPTY:
      MATERIAL: "BARRIER" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
      DISPLAY-NAME: "&cɴᴏ ᴄʀᴀᴛᴇѕ" # Text string (supports & color codes)
      LORE:
        - "&7ɴᴏ ᴄʀᴀᴛᴇѕ ᴀʀᴇ ᴀᴠᴀɪʟᴀʙʟᴇ ʀɪɢʜᴛ ɴᴏᴡ."
    CLOSE-BUTTON:
      SLOT: 26 # Sets the inventory slot used by this item.
      MATERIAL: "BARRIER" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
      DISPLAY-NAME: "&cᴄʟᴏѕᴇ" # Text string (supports & color codes)
      LORE:
        - "&7ᴄʟᴏѕᴇ ᴛʜɪѕ ᴍᴇɴᴜ."

  CONFIRM-MENU:
    SIZE: 27 # Inventory size in slots (multiple of 9, max 54)
    FILLER: "GRAY_STAINED_GLASS_PANE" # Filler setting.
    PREVIEW-SLOT: 13 # Sets the inventory slot used by this item.
    CONFIRM-SLOT: 15 # Sets the inventory slot used by this item.
    CONFIRM-BUTTON:
      MATERIAL: "LIME_STAINED_GLASS_PANE" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
      DISPLAY-NAME: "&aᴄᴏɴꜰɪʀᴍ" # Text string (supports & color codes)
      LORE:
        - "&7ᴄʟᴀɪᴍ &f{reward}&7 ꜰʀᴏᴍ"
        - "&b{crate}&7."
    CANCEL-BUTTON:
      SLOT: 11 # Sets the inventory slot used by this item.
      MATERIAL: "RED_STAINED_GLASS_PANE" # Options: Valid Bukkit Material (e.g., DIAMOND, STONE, IRON_INGOT)
      DISPLAY-NAME: "&cᴄᴀɴᴄᴇʟ" # Text string (supports & color codes)
      LORE:
        - "&7ʀᴇᴛᴜʀɴ ᴛᴏ ᴛʜᴇ ʀᴇᴡᴀʀᴅ ʟɪѕᴛ."

  HOLOGRAM:
    OFFSET-Y: 1.6 # Offset Y setting.
    KEY-LINE-OFFSET-Y: -0.3 # Key Line Offset Y setting.
    VIEW-DISTANCE: 24.0 # View Distance setting.
    UPDATE-TICKS: 20 # Sets how often this task or update runs.
    LINES:
      - "{crate}"
      - "&7right-click to open"
      - "&e/store"
    KEY-LINE: "&7keys: &f{keys}" # Key Line setting.

  PREVIEW:
    ENABLED: true # Options: true or false
    OFFSET-Y: 1.25 # The vertical offset above the crate block for the preview item.
    UPDATE-INTERVAL-TICKS: 2 # How often to update the rotation/hover on the server (1 = every tick, 2 = every 2 ticks, etc). Higher values reduce server lag.
    CYCLE-INTERVAL-TICKS: 40 # Cycle to the next reward item every 2 seconds.
    ROTATION-SPEED: 4.0 # Rotation speed factor in degrees per tick.
    HOVER-AMPLITUDE: 0.08 # Maximum vertical distance to float up and down.
    HOVER-SPEED: 0.08 # Speed/frequency of the floating motion.

  PARTICLES:
    ENABLED: true # Options: true or false
    TYPE: "ENCHANT" # Type setting.
    COUNT: 4 # Count setting.

  GACHA:
    TITLE: "&8rolling reward" # Text string (supports & color codes)
    FILLER: "BLACK_STAINED_GLASS_PANE" # Filler setting.
    PREVIEW-SLOTS: [10, 11, 12, 13, 14, 15, 16] # Preview Slots setting.
    POINTER-SLOT: 13 # Sets the inventory slot used by this item.
    TOTAL-STEPS: 38 # Total Steps setting.
    TICK-INTERVAL: 2 # Sets how often this task or update runs.

