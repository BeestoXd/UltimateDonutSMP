# Determines whether Enabled is enabled or disabled. Available options: true, false
ENABLED: true
# A list configuration for Reset Worlds. Available options: Multiple items
RESET-WORLDS: []
# A list configuration for Protected Worlds. Available options: Multiple items
PROTECTED-WORLDS: []
# The numerical value for Token Ttl Seconds. Available options: Any valid integer
TOKEN-TTL-SECONDS: 300
# The text or value for Backup Directory. Available options: Any valid string text
BACKUP-DIRECTORY: server-wipe-backups
MESSAGES:
  # The text or value for Maintenance. Available options: Any valid string text
  MAINTENANCE: '&cthe server is preparing a season reset. try again after the restart.'
  # The text or value for Kick. Available options: Any valid string text
  KICK: '&ca season reset is starting. the server will restart shortly.'
