# UDS setup: Item worth values, worth display behavior, browser menus, and blocked items.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Worth display formatting and item lore behavior.
DISPLAY:
  FORMAT: "&7Worth: &a$${price}" # Sets the text format used by this option.

# UDS setup: Worth calculation rules for containers and nested contents.
CONTAINER:
  ENABLED: true # Enables or disables container.
  INCLUDE-CONTAINER-BASE-PRICE: true # Sets the economy value used by this option.
  ALLOW-NESTED-CONTAINERS: false # Configures the allow nested containers option.
  MAX-CONTAINER-DEPTH: 1 # Sets the allowed limit for this option.

# UDS setup: Worth browser pagination and search behavior.
BROWSER:
  TITLE: "&8Item Prices" # Sets the title text shown for this menu or prompt.
  SIZE: 54 # Sets the inventory size in slots.
  ITEMS-PER-PAGE: 45 # Sets how many entries appear on each page.
  DEFAULT-SORT: CATEGORY # Sets the default value used when none is selected.
  ITEM:
    NAME: "&b{item}"
    LORE:
      - "&7Category: &f{category}"
      - "&7Unit price: {unit_price_formatted}"
      - "&7Stack x{stack_size}: {stack_price_formatted}"
      - ""
      - "&eClick to send the unit price in chat"
  CATEGORY-SORT:
    - CROPS
    - ORES
    - MOBS
    - NATURAL
    - ARMOR_AND_TOOLS
    - FISH
    - BOOK
    - POTION
    - BLOCKS

