# UDS setup: Duel match rules, arena behavior, countdowns, GUI, and server routing.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Enables or disables settings.
  COUNTDOWN_SECONDS: 5 # Sets the time value in seconds.
  MATCH_DURATION_SECONDS: 900 # Sets how long this behavior lasts.
  REQUEST_TIMEOUT_SECONDS: 30 # Sets the time value in seconds.
  DRAW_REQUEST_TIMEOUT_SECONDS: 15 # Sets the time value in seconds.
  RETURN_DELAY_SECONDS: 3 # Sets the time value in seconds.
  ROLLBACK_PADDING_HORIZONTAL: 8 # Configures the rollback padding horizontal option.
  ROLLBACK_PADDING_VERTICAL: 6 # Configures the rollback padding vertical option.

# UDS setup: Duel map source priority and map loading behavior.
MAP_SOURCES:
  STATIC_WORLDS:
    ENABLED: true # Enables or disables static worlds.
    AUTO_LOAD: true # Configures the auto load option.
    # Optional world folder names to load before duel arenas are read from storage.
    # This is compatible with Multiverse-Core but does not require it.
    WORLDS: [] # Configures the worlds option.
  RANDOM_BIOMES:
    ENABLED: true # Enables or disables random biomes.
    WORLD_PREFIX: "duel_biome_" # Configures the world prefix option.
    WORLD_FOLDER: "duel" # Configures the world folder option.
    # Valid modes: FLAT (lightweight generated arena) or VANILLA (natural terrain using prepared pool).
    TERRAIN_MODE: FLAT # Selects the mode or type used by this option.
    TERRAIN_MODE_SETTINGS:
      FLAT:
        ALLOW_ITEM_DROP: false # Configures the allow item drop option.
        ALLOW_BLOCK_BREAK: true # Configures the allow block break option.
        ALLOW_BLOCK_PLACE: true # Configures the allow block place option.
        ALLOW_BUCKET_USE: true # Configures the allow bucket use option.
        NO_HUNGER: false # Configures the no hunger option.
        NO_WEATHER: false # Configures the no weather option.
        ALWAYS_MORNING: false # Configures the always morning option.
        NO_FALL_DAMAGE: false # Configures the no fall damage option.
      VANILLA:
        ALLOW_ITEM_DROP: false # Configures the allow item drop option.
        ALLOW_BLOCK_BREAK: true # Configures the allow block break option.
        ALLOW_BLOCK_PLACE: true # Configures the allow block place option.
        ALLOW_BUCKET_USE: true # Configures the allow bucket use option.
        NO_HUNGER: false # Configures the no hunger option.
        NO_WEATHER: false # Configures the no weather option.
        ALWAYS_MORNING: false # Configures the always morning option.
        NO_FALL_DAMAGE: false # Configures the no fall damage option.
    ARENA_RADIUS: 48 # Sets the radius used for this check or effect.
    SPAWN_DISTANCE: 16 # Configures the spawn distance option.
    SPAWN_SEARCH_RADIUS: 16 # Sets the radius used for this check or effect.
    CLEANUP_AFTER_MATCH: true # Configures the cleanup after match option.
    GENERATE_STRUCTURES: false # Configures the generate structures option.
    FLAT_POOL:
      ENABLED: true # Enables or disables flat pool.
      SIZE: 2 # Sets the inventory size in slots.
      PREPARE_INTERVAL_TICKS: 20 # Sets how often this task or update runs.
      REUSE_WORLDS: true # Configures the reuse worlds option.
    VANILLA_POOL:
      ENABLED: true # Enables or disables vanilla pool.
      # Enable this only when TERRAIN_MODE is VANILLA and you want natural generated biome worlds.
      RUNTIME_GENERATION: true # Configures the runtime generation option.
      SIZE: 2 # Sets the inventory size in slots.
      CHUNKS_PER_TICK: 1 # Configures the chunks per tick option.
      PREPARE_INTERVAL_TICKS: 1 # Sets how often this task or update runs.
      MAX_SYNC_STEP_MS: 2000 # Sets the allowed limit for this option.
      PAUSE_ON_SLOW_STEP: true # Configures the pause on slow step option.
    # Accepts minecraft:plains, plains, or PLAINS. Empty allowlist means all runtime biomes.
    ALLOWLIST: [] # Configures the allowlist option.
    EXCLUDE:
      - minecraft:the_void

# UDS setup: Duel world border size, shrink timing, and warning behavior.
WORLDBORDER:
  ENABLED: true # Enables or disables worldborder.
  SIZE: 96 # Sets the inventory size in slots.
  WARNING_DISTANCE: 4 # Configures the warning distance option.
  WARNING_TIME: 5 # Configures the warning time option.
  DAMAGE_BUFFER: 0 # Configures the damage buffer option.
  ACTION: PUSH_BACK # Configures the action option.
  ESCAPE_GRACE_TICKS: 40 # Sets how often this task or update runs.
  FALLBACK_ACTION: FORFEIT # Configures the fallback action option.

# UDS setup: Commands blocked or allowed during duel matches.
COMMAND_BLOCK:
  ENABLED: true # Enables or disables command block.
  MODE: ALLOWLIST # Selects the mode or type used by this option.
  ALLOWLIST:
    - /duel
    - /draw
    - /leave
    - /queue
    - /create
  BLOCKLIST:
    - /tpa
    - /tpahere
    - /home
    - /spawn
    - /rtp
  MESSAGE: "&cYou cannot use that command during a duel." # Configures the message option.

# UDS setup: Cross-server duel queue and routing settings.
CROSS_SERVER:
  ENABLED: false # Enables or disables cross server.
  REDIS_CHANNEL: "ultimatedonutsmp:duels" # Configures the redis channel option.
  KEY_PREFIX: "uds:duels:" # Configures the key prefix option.
  LOCAL_SERVER_ID: "local" # Sets the identifier used to link this configuration.
  PROXY_SERVER_NAME: "local" # Sets the name text used here.
  TRANSFER_TIMEOUT_SECONDS: 20 # Sets the time value in seconds.
  STALE_QUEUE_TIMEOUT_SECONDS: 45 # Sets the time value in seconds.

# UDS setup: Countdown timing and titles before a match starts.
START-COUNTDOWN:
  ENABLED: true # Enables or disables start countdown.
  SOUNDS:
    ENABLED: true # Enables or disables sounds.
  TITLES:
    6: "" # Configures the 6 option.
    5: "&e5" # Configures the 5 option.
    4: "&e4" # Configures the 4 option.
    3: "&c3" # Configures the 3 option.
    2: "&c2" # Configures the 2 option.
    1: "&c1" # Configures the 1 option.
    0: "&a&lfight!" # Configures the 0 option.
  MESSAGES:
    "5": "&a5" # Sets the message text for this response.
    "4": "&a4" # Sets the message text for this response.
    "3": "&a3" # Sets the message text for this response.
    "2": "&a2" # Sets the message text for this response.
    "1": "&a1" # Sets the message text for this response.
  START-MESSAGE: "&amatch started!" # Configures the start message option.

# UDS setup: Win/loss/draw titles shown after a match ends.
RESULT-TITLES:
  victory:
    title: "&e&lvictory!" # Sets the title text shown for this menu or prompt.
    subtitle: "&e<player> &fwon the match!" # Configures the subtitle option.
  defeat:
    title: "&c&ldefeat!" # Sets the title text shown for this menu or prompt.
    subtitle: "&c<opponent> &fwon this match!" # Configures the subtitle option.
  draw:
    title: "&e&ldraw!" # Sets the title text shown for this menu or prompt.
    subtitle: "&ftime's up - no winner." # Configures the subtitle option.
    message: "&e[timer] &ftime limit reached! match ended as a &edraw &f- streaks unchanged." # Configures the message option.

# UDS setup: Arena world, spawn, rollback, and match environment defaults.
ARENA_SETTINGS: {} # Configures the arena settings option.

# UDS setup: Menu title, rows, slots, buttons, and item layout for this feature.
GUI:
  QUEUE:
    TITLE: "&8ᴄᴀѕᴜᴀʟ ǫᴜᴇᴜᴇ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
  CREATE:
    TITLE: "&8ᴄʀᴇᴀᴛᴇ ᴅᴜᴇʟ -> {player}" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
  CLAIMS:
    TITLE: "&8ᴅᴜᴇʟ ᴄʟᴀɪᴍѕ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
