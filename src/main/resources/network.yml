# Configuration section for Network.
NETWORK:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  # Determines whether Staff Chat Enabled is enabled or disabled. Available options: true, false
  STAFF_CHAT_ENABLED: true
  # Determines whether Helpop Enabled is enabled or disabled. Available options: true, false
  HELPOP_ENABLED: true
  # Determines whether Report Enabled is enabled or disabled. Available options: true, false
  REPORT_ENABLED: true
  # Determines whether Staff Join Leave Enabled is enabled or disabled. Available options: true, false
  STAFF_JOIN_LEAVE_ENABLED: true
  # Determines whether Server Status Enabled is enabled or disabled. Available options: true, false
  SERVER_STATUS_ENABLED: true
  # The text or value for Local Server Id. Available options: Any valid string text
  LOCAL_SERVER_ID: crystal
  # The text or value for Local Display Name. Available options: Any valid string text
  LOCAL_DISPLAY_NAME: Crystal
  # The text or value for Redis Channel. Available options: Any valid string text
  REDIS_CHANNEL: ultimatedonutsmp:staff-chat
  # The text or value for Helpop Redis Channel. Available options: Any valid string text
  HELPOP_REDIS_CHANNEL: ultimatedonutsmp:staff-alerts
  # The text or value for Report Redis Channel. Available options: Any valid string text
  REPORT_REDIS_CHANNEL: ultimatedonutsmp:staff-alerts
  # Determines whether Send Local Fallback On Redis Error is enabled or disabled. Available options: true, false
  SEND_LOCAL_FALLBACK_ON_REDIS_ERROR: true
  # Determines whether Staff Alerts Local Fallback On Redis Error is enabled or disabled. Available options: true, false
  STAFF_ALERTS_LOCAL_FALLBACK_ON_REDIS_ERROR: true
  # Determines whether Staff Alerts Warn Sender On Redis Error is enabled or disabled. Available options: true, false
  STAFF_ALERTS_WARN_SENDER_ON_REDIS_ERROR: false
  # Determines whether Log To Console is enabled or disabled. Available options: true, false
  LOG_TO_CONSOLE: true
  # Determines whether Staff Alerts Log To Console is enabled or disabled. Available options: true, false
  STAFF_ALERTS_LOG_TO_CONSOLE: true
  # The numerical value for Max Message Length. Available options: Any valid integer
  MAX_MESSAGE_LENGTH: 512
  # The numerical value for Staff Alerts Max Reason Length. Available options: Any valid integer
  STAFF_ALERTS_MAX_REASON_LENGTH: 256
  # The numerical value for Helpop Cooldown Seconds. Available options: Any valid integer
  HELPOP_COOLDOWN_SECONDS: 30
  # The numerical value for Report Cooldown Seconds. Available options: Any valid integer
  REPORT_COOLDOWN_SECONDS: 60
  # The text or value for Server Status. Available options: Any valid string text
  SERVER_STATUS: '&6%server% &eIs now %status%&e.'
  # The text or value for Staff Chat. Available options: Any valid string text
  STAFF_CHAT: '&8[&dNetwork&8] &7[%server%] &e%player%&8: &f%message%'
  # The text or value for Staff Join. Available options: Any valid string text
  STAFF_JOIN: '&8[&a+&8] &a%player% &7Joined &b%server%'
  # The text or value for Staff Leave. Available options: Any valid string text
  STAFF_LEAVE: '&8[&c-&8] &a%player% &7Left &b%server%'
# Configuration section for Network Status.
NETWORK-STATUS:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  # The text or value for Local Server Id. Available options: Any valid string text
  LOCAL-SERVER-ID: crystal
  # The text or value for Local Display Name. Available options: Any valid string text
  LOCAL-DISPLAY-NAME: Crystal
  # The numerical value for Refresh Seconds. Available options: Any valid integer
  REFRESH-SECONDS: 5
  # The numerical value for Timeout Ms. Available options: Any valid integer
  TIMEOUT-MS: 1500
  # Configuration section for Endpoint.
  ENDPOINT:
    # Determines whether Enabled is enabled or disabled. Available options: true, false
    ENABLED: false
    # The text or value for Host. Available options: Any valid string text
    HOST: 0.0.0.0
    # The numerical value for Port. Available options: Any valid integer
    PORT: 8123
    # The text or value for Path. Available options: Any valid string text
    PATH: /status
    # The text or value for Token. Available options: Any valid string text
    TOKEN: change-me
  # Configuration section for Servers.
  SERVERS:
    # Configuration section for Crystal.
    crystal:
      # The text or value for Display. Available options: Any valid string text
      DISPLAY: Crystal
      # Configuration section for Source.
      SOURCE:
        TYPE: LOCAL
