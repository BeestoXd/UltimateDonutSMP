# UDS setup: Network status, server metadata, and optional status endpoint settings.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Network identity and cross-server communication settings.
NETWORK:
  ENABLED: true # Options: true or false
  STAFF_CHAT_ENABLED: true # Options: true or false
  HELPOP_ENABLED: true # Options: true or false
  REPORT_ENABLED: true # Options: true or false
  STAFF_JOIN_LEAVE_ENABLED: true # Options: true or false
  SERVER_STATUS_ENABLED: true # Options: true or false
  LOCAL_SERVER_ID: "crystal" # Sets the identifier used to link this configuration.
  LOCAL_DISPLAY_NAME: "crystal" # Text string (supports & color codes)
  REDIS_CHANNEL: "ultimatedonutsmp:staff-chat" # Redis Channel setting.
  HELPOP_REDIS_CHANNEL: "ultimatedonutsmp:staff-alerts" # Helpop Redis Channel setting.
  REPORT_REDIS_CHANNEL: "ultimatedonutsmp:staff-alerts" # Report Redis Channel setting.
  SEND_LOCAL_FALLBACK_ON_REDIS_ERROR: true # Send Local Fallback On Redis Error setting.
  STAFF_ALERTS_LOCAL_FALLBACK_ON_REDIS_ERROR: true # Staff Alerts Local Fallback On Redis Error setting.
  STAFF_ALERTS_WARN_SENDER_ON_REDIS_ERROR: false # Staff Alerts Warn Sender On Redis Error setting.
  LOG_TO_CONSOLE: true # Log To Console setting.
  STAFF_ALERTS_LOG_TO_CONSOLE: true # Staff Alerts Log To Console setting.
  MAX_MESSAGE_LENGTH: 512 # Numeric value (integer)
  STAFF_ALERTS_MAX_REASON_LENGTH: 256 # Numeric value (integer)
  HELPOP_COOLDOWN_SECONDS: 30 # Sets the cooldown before this action can run again.
  REPORT_COOLDOWN_SECONDS: 60 # Sets the cooldown before this action can run again.
  SERVER_STATUS: "&6%server% &eis now %status%&e." # Server Status setting.
  STAFF_CHAT: "&8[&dnetwork&8] &7[%server%] &e%player%&8: &f%message%" # Staff Chat setting.
  STAFF_JOIN: "&8[&a+&8] &a%player% &7joined &b%server%" # Staff Join setting.
  STAFF_LEAVE: "&8[&c-&8] &a%player% &7left &b%server%" # Staff Leave setting.

# UDS setup: Network status endpoint, server list, and refresh behavior.
NETWORK-STATUS:
  ENABLED: true # Options: true or false
  LOCAL-SERVER-ID: "crystal" # Sets the identifier used to link this configuration.
  LOCAL-DISPLAY-NAME: "crystal" # Text string (supports & color codes)
  REFRESH-SECONDS: 5 # Sets the time value in seconds.
  TIMEOUT-MS: 1500 # Timeout Ms setting.

  ENDPOINT:
    ENABLED: false # Options: true or false
    HOST: "0.0.0.0" # Sets the database connection value for this field.
    PORT: 8123 # Sets the database connection value for this field.
    PATH: "/status" # Path setting.
    TOKEN: "change-me" # Sets the identifier used to link this configuration.

  SERVERS:
    crystal:
      DISPLAY: "crystal" # Display setting.
      SOURCE:
        TYPE: "LOCAL" # Type setting.

    # Example remote servers. Enable the endpoint above on the other server,
    # then point the URL below to that server's status endpoint.
    #
    # practice:
    #   DISPLAY: "Practice"
    #   SOURCE:
    #     TYPE: "HTTP"
    #     URL: "http://10.0.0.12:8123/status"
    #     TOKEN: "change-me"
    #
    # smp:
    #   DISPLAY: "SMP"
    #   SOURCE:
    #     TYPE: "HTTP"
    #     URL: "http://10.0.0.13:8123/status"
    #     TOKEN: "change-me"

# UDS setup: Seamless maintenance settings
MAINTENANCE:
  ENABLED: true                     # Options: true or false
  USE_PROXY: false                   # If true, redirect to LOBBY_SERVER. If false, teleport to LOBBY_WORLD spawn on the same server.
  LOBBY_SERVER: "lobby"             # The fallback/lobby server name in BungeeCord/Velocity
  LOBBY_WORLD: "world"              # The fallback/lobby world name on the same server
  BYPASS_PERMISSION: "ultimatedonutsmp.admin.maintenance.bypass" # Players with this permission can join during maintenance
  RECONNECT_DELAY_SECONDS: 5        # Delay before sending players back when server is back online

  
  MESSAGES:
    ENTERING: "&d[ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ] &7ѕᴇʀᴠᴇʀ ɪѕ ᴇɴᴛᴇʀɪɴɢ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ. ᴍᴏᴠɪɴɢ ʏᴏᴜ ᴛᴏ ᴛʜᴇ ʟᴏʙʙʏ..."
    BYPASS_JOIN: "&d[ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ] &7ʏᴏᴜ ᴊᴏɪɴᴇᴅ ᴡʜɪʟᴇ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ ᴍᴏᴅᴇ ɪѕ ᴀᴄᴛɪᴠᴇ."
    NOT_ALLOWED: "&d[ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ] &cᴛʜɪѕ ѕᴇʀᴠᴇʀ ɪѕ ᴄᴜʀʀᴇɴᴛʟʏ ɪɴ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ. ʀᴇᴅɪʀᴇᴄᴛɪɴɢ ᴛᴏ ʟᴏʙʙʏ..."
    KICK_FALLBACK: "&cᴛʜɪѕ ѕᴇʀᴠᴇʀ ɪѕ ɪɴ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ ᴀɴᴅ ɴᴏ ʟᴏʙʙʏ ɪѕ ᴀᴠᴀɪʟᴀʙʟᴇ."
    RECONNECTING_TITLE: "&a&lѕᴇʀᴠᴇʀ ᴏɴʟɪɴᴇ"
    RECONNECTING_SUBTITLE: "&7ѕᴇɴᴅɪɴɢ ʏᴏᴜ ʙᴀᴄᴋ ɪɴ %seconds% ѕᴇᴄᴏɴᴅѕ..."

