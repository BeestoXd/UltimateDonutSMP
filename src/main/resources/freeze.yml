# UDS setup: Staff freeze behavior, persistence, allowed commands, alerts, and messages.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Configure FREEZE options for this file.
FREEZE:
  ENABLED: true # Options: true or false
  PERSIST-ON-QUIT: true # Persist On Quit setting.
  PERSIST-ON-RESTART: true # Persist On Restart setting.
  ALLOW-LOOK: true # Allow Look setting.
  ALERT-INTERVAL-TICKS: 100 # Sets how often this task or update runs.
  LOG-USAGE: true # Log Usage setting.
  SERVER-NAME: "survival-01" # Sets the name text used here.
  STAFF-PERMISSION: "ultimatedonutsmp.staff.freeze" # Permission node (e.g., ultimatedonutsmp.admin)
  ALERT-PERMISSION: "ultimatedonutsmp.staff.freeze.alert" # Permission node (e.g., ultimatedonutsmp.admin)
  EXEMPT-PERMISSION: "ultimatedonutsmp.staff.freeze.exempt" # Permission node (e.g., ultimatedonutsmp.admin)
  ADMIN-PERMISSION: "ultimatedonutsmp.admin.freeze" # Numeric value (integer)
  ALLOWED-COMMANDS:
    - "/discord"
    - "/social"
    - "/msg"
    - "/r"
    - "/helpop"

  STATUS_ON: "&a&lON" # Status On setting.
  STATUS_OFF: "&c&lOFF" # Status Off setting.
  MESSAGE: "&bfreeze &a%player% &7is now %status%" # Message setting.
  ALERT:
    - ""
    - "&c&lyou're currently frozen!"
    - ""
    - "&7- you cannot move or interact"
    - "&7- staff members are reviewing your actions"
    - "&7- join our discord for support:"
    - "&6&ohttps://discord.com"
    - ""
  QUIT_MESSAGE: "&c[freeze] &4%player% &cleft while frozen on &4%server%" # Quit Message setting.

# UDS setup: Configure MESSAGES options for this file.
MESSAGES:
  NO-PERMISSION: "&cyou do not have permission." # Sets the message text for this response.
  FEATURE-DISABLED: "&cᴛʜᴇ ꜰʀᴇᴇᴢᴇ ѕʏѕᴛᴇᴍ ɪѕ ᴅɪѕᴀʙʟᴇᴅ." # Sets the message text for this response.
  PLAYER-NOT-FOUND: "&cᴘʟᴀʏᴇʀ ɴᴏᴛ ꜰᴏᴜɴᴅ." # Sets the message text for this response.
  TARGET-OFFLINE: "&cᴛʜᴀᴛ ᴘʟᴀʏᴇʀ ᴍᴜѕᴛ ʙᴇ ᴏɴʟɪɴᴇ." # Sets the message text for this response.
  TARGET-EXEMPT: "&cʏᴏᴜ ᴄᴀɴɴᴏᴛ ꜰʀᴇᴇᴢᴇ ᴛʜᴀᴛ ᴘʟᴀʏᴇʀ." # Sets the message text for this response.
  SELF-TARGET: "&cʏᴏᴜ ᴄᴀɴɴᴏᴛ ꜰʀᴇᴇᴢᴇ ʏᴏᴜʀѕᴇʟꜰ." # Sets the message text for this response.
  COMMAND-BLOCKED: "&cʏᴏᴜ ᴄᴀɴɴᴏᴛ ᴜѕᴇ ᴄᴏᴍᴍᴀɴᴅѕ ᴡʜɪʟᴇ ꜰʀᴏᴢᴇɴ." # Sets the message text for this response.
  STILL-FROZEN: "&cʏᴏᴜ ᴀʀᴇ ѕᴛɪʟʟ ꜰʀᴏᴢᴇɴ. ᴡᴀɪᴛ ꜰᴏʀ ѕᴛᴀꜰꜰ ɪɴѕᴛʀᴜᴄᴛɪᴏɴѕ." # Sets the message text for this response.
  UNFROZEN: "&aʏᴏᴜ ᴀʀᴇ ɴᴏ ʟᴏɴɢᴇʀ ꜰʀᴏᴢᴇɴ." # Sets the message text for this response.
  RELOAD-SUCCESS: "&aꜰʀᴇᴇᴢᴇ ᴄᴏɴꜰɪɢ ʀᴇʟᴏᴀᴅᴇᴅ." # Sets the message text for this response.
