# Configuration section for Freeze.
FREEZE:
  # Determines whether Enabled is enabled or disabled. Available options: true, false
  ENABLED: true
  # Determines whether Persist On Quit is enabled or disabled. Available options: true, false
  PERSIST-ON-QUIT: true
  # Determines whether Persist On Restart is enabled or disabled. Available options: true, false
  PERSIST-ON-RESTART: true
  # Determines whether Allow Look is enabled or disabled. Available options: true, false
  ALLOW-LOOK: true
  # The numerical value for Alert Interval Ticks. Available options: Any valid integer
  ALERT-INTERVAL-TICKS: 100
  # Determines whether Log Usage is enabled or disabled. Available options: true, false
  LOG-USAGE: true
  # The text or value for Server Name. Available options: Any valid string text
  SERVER-NAME: survival-01
  # The text or value for Staff Permission. Available options: Any valid string text
  STAFF-PERMISSION: ultimatedonutsmp.staff.freeze
  # The text or value for Alert Permission. Available options: Any valid string text
  ALERT-PERMISSION: ultimatedonutsmp.staff.freeze.alert
  # The text or value for Exempt Permission. Available options: Any valid string text
  EXEMPT-PERMISSION: ultimatedonutsmp.staff.freeze.exempt
  # The text or value for Admin Permission. Available options: Any valid string text
  ADMIN-PERMISSION: ultimatedonutsmp.admin.freeze
  # Configuration section for Allowed Commands.
  ALLOWED-COMMANDS:
  - /discord
  - /social
  - /msg
  - /r
  - /helpop
  # The text or value for Status On. Available options: Any valid string text
  STATUS_ON: '&a&lON'
  # The text or value for Status Off. Available options: Any valid string text
  STATUS_OFF: '&c&lOff'
  # The text or value for Message. Available options: Any valid string text
  MESSAGE: '&bFreeze &a%player% &7is now %status%'
  # Configuration section for Alert.
  ALERT:
  - ''
  - '&c&lYou''Re currently frozen!'
  - ''
  - '&7- You cannot move or interact'
  - '&7- Staff members are reviewing your actions'
  - '&7- Join our Discord for support:'
  - '&6&oHttps://discord.com'
  - ''
  # The text or value for Quit Message. Available options: Any valid string text
  QUIT_MESSAGE: '&c[Freeze] &4%player% &cleft while frozen on &4%server%'
MESSAGES:
  # The text or value for No Permission. Available options: Any valid string text
  NO-PERMISSION: '&cYou do not have permission.'
  # The text or value for Feature Disabled. Available options: Any valid string text
  FEATURE-DISABLED: '&cThe Freeze system is disabled.'
  # The text or value for Player Not Found. Available options: Any valid string text
  PLAYER-NOT-FOUND: '&cPlayer not found.'
  # The text or value for Target Offline. Available options: Any valid string text
  TARGET-OFFLINE: '&cThat player must be online.'
  # The text or value for Target Exempt. Available options: Any valid string text
  TARGET-EXEMPT: '&cYou cannot freeze that player.'
  # The text or value for Self Target. Available options: Any valid string text
  SELF-TARGET: '&cYou cannot freeze yourself.'
  # The text or value for Command Blocked. Available options: Any valid string text
  COMMAND-BLOCKED: '&cYou cannot use commands while frozen.'
  # The text or value for Still Frozen. Available options: Any valid string text
  STILL-FROZEN: '&cYou are still frozen. Wait for staff instructions.'
  # The text or value for Unfrozen. Available options: Any valid string text
  UNFROZEN: '&aYou are no longer frozen.'
  # The text or value for Reload Success. Available options: Any valid string text
  RELOAD-SUCCESS: '&aFreeze config reloaded.'
