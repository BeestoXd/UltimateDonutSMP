name: Build Jar

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build Project
        run: mvn clean package

      - name: Get Project Version
        id: metadata
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Shaded Jar
        uses: actions/upload-artifact@v4
        with:
          name: UltimateDonutSmp-${{ steps.metadata.outputs.version }}
          path: target/UltimateDonutSmp-*.jar
          if-no-files-found: error

      - name: Release Nightly Build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "UltimateDonutSMP Nightly Build"
          body: |
            ### Automated Nightly Build
            This is an automated development build compiled from the latest source code.
            
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Build Date:** ${{ github.event.head_commit.timestamp }}
          prerelease: true
          files: target/UltimateDonutSmp-*.jar
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
